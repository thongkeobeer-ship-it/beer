<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ออเดอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; }

:root{
  --bg:#0a0a0c;
  --card:#141417;
  --line:#28282e;
  --red:#ff2b45;
  --green:#3ddc73;
  --gold:#ffcf4d;
  --muted:#8b8b95;
}

body{ background:var(--bg); color:#fff; padding-bottom:40px; }

.topbar{
  padding:16px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.topbar h1{ font-size:18px; font-weight:700; }
.refresh-btn{
  background:var(--card);
  border:1px solid var(--line);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
}

.filters{
  display:flex;
  gap:8px;
  padding:14px 16px 0;
  overflow-x:auto;
}
.f-chip{
  flex-shrink:0;
  background:var(--card);
  border:1px solid var(--line);
  color:#ccc;
  padding:8px 16px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.f-chip.active{
  background:var(--red);
  border-color:var(--red);
  color:#fff;
  font-weight:600;
}

.list{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.order-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.order-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
}
.order-id{ font-size:11px; color:var(--muted); }
.order-status{
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  border-radius:12px;
}
.st-pending{ background:#3a2f0a; color:var(--gold); }
.st-confirmed{ background:#0a3a1c; color:var(--green); }
.st-rejected{ background:#3a0a0a; color:var(--red); }

.order-name{ font-size:16px; font-weight:700; margin-bottom:4px; }
.order-meta{ font-size:12.5px; color:var(--muted); margin-bottom:2px; }
.order-price{ font-size:18px; font-weight:800; color:var(--gold); margin:8px 0; }
.order-code{
  font-size:12.5px;
  color:var(--green);
  background:#0a0a0c;
  border:1px dashed var(--green);
  border-radius:8px;
  padding:8px 10px;
  margin:8px 0;
  word-break:break-all;
}

.slip-img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  background:#000;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:12px;
  cursor:pointer;
}
.no-slip{
  text-align:center;
  padding:20px;
  color:var(--muted);
  font-size:12.5px;
  border:1px dashed var(--line);
  border-radius:12px;
  margin-bottom:12px;
}

.btn-row{ display:flex; gap:10px; }
.btn-confirm, .btn-reject{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}
.btn-confirm{ background:linear-gradient(180deg,#4fe08a,#1ca652); color:#04150a; }
.btn-reject{ background:linear-gradient(180deg,#ff5a70,#c60f24); color:#fff; }
.btn-confirm:disabled, .btn-reject:disabled{ opacity:.35; cursor:default; }

.empty-msg{
  text-align:center;
  color:var(--muted);
  padding:60px 20px;
  font-size:13.5px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:#000d;
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.lightbox img{ max-width:100%; max-height:100%; border-radius:10px; }

/* ===== คลังรหัส ===== */
.stock-panel{
  margin:16px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}
.stock-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
}
.stock-head h2{ font-size:14.5px; }
.stock-body{ display:none; margin-top:14px; }
.stock-body.open{ display:block; }
.stock-body label{ font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
.stock-body input, .stock-body textarea{
  width:100%;
  background:#0a0a0c;
  border:1px solid var(--line);
  border-radius:10px;
  color:#fff;
  padding:10px;
  font-size:13.5px;
  font-family:inherit;
  margin-bottom:12px;
}
.stock-body textarea{ min-height:100px; resize:vertical; }
.stock-add-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#4fe08a,#1ca652);
  color:#04150a;
  font-weight:700;
  font-size:13.5px;
  cursor:pointer;
  font-family:inherit;
}
.stock-summary{ margin-top:14px; border-top:1px solid var(--line); padding-top:12px; }
.stock-row{
  display:flex;
  justify-content:space-between;
  font-size:12.5px;
  padding:6px 0;
  color:#ccc;
}
.stock-row b{ color:var(--gold); }
</style>
</head>
<body>

<div class="topbar">
<h1>📋 รายการออเดอร์</h1>
<button class="refresh-btn" onclick="loadOrders()">🔄 รีเฟรช</button>
</div>

<div class="filters">
<span class="f-chip active" data-f="all">ทั้งหมด</span>
<span class="f-chip" data-f="pending">รอตรวจสอบ</span>
<span class="f-chip" data-f="confirmed">ยืนยันแล้ว</span>
<span class="f-chip" data-f="rejected">ปฏิเสธแล้ว</span>
</div>

<div class="stock-panel">
  <div class="stock-head" onclick="toggleStockPanel()">
    <h2>📦 คลังรหัสสินค้า</h2>
    <span id="stockToggleIcon">▾</span>
  </div>
  <div class="stock-body" id="stockBody">
    <label>ชื่อสินค้า (ต้องพิมพ์ให้ตรงกับชื่อในหน้าเว็บเป๊ะๆ เช่น "PUBG Mobile")</label>
    <input type="text" id="stockProductName" placeholder="เช่น PUBG Mobile">

    <label>รหัส (1 บรรทัด = 1 รหัส ใส่ได้หลายอันพร้อมกัน)</label>
    <textarea id="stockCodesInput" placeholder="ABCD-1234-XXXX&#10;EFGH-5678-YYYY&#10;..."></textarea>

    <button class="stock-add-btn" onclick="addStockCodes()">➕ เพิ่มเข้าคลัง</button>

    <div class="stock-summary" id="stockSummary"></div>
  </div>
</div>

<div class="list" id="orderList">
<div class="empty-msg">กำลังโหลด...</div>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script src="supabase.js"></script>
<script>

const ADMIN_EMAIL = "thongkeobeer@gmail.com";

let currentFilter = "all";
let allOrders = [];

(async function checkAdmin(){
  const {data:{user}} = await supabaseClient.auth.getUser();

  if(!user){
    alert("กรุณาล็อกอินก่อน");
    location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("หน้านี้สำหรับแอดมินเท่านั้น");
    location.href = "index.html";
    return;
  }

  loadOrders();
})();


async function loadOrders(){
  const list = document.getElementById("orderList");
  list.innerHTML = '<div class="empty-msg">กำลังโหลด...</div>';

  const {data, error} = await supabaseClient
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    list.innerHTML = '<div class="empty-msg">โหลดไม่สำเร็จ: ' + error.message + '</div>';
    return;
  }

  allOrders = data || [];
  renderList();
}

function renderList(){
  const list = document.getElementById("orderList");
  const filtered = currentFilter === "all"
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-msg">ไม่มีออเดอร์ในหมวดนี้</div>';
    return;
  }

  list.innerHTML = filtered.map(function(o){
    const statusClass = "st-" + (o.status || "pending");
    const statusLabel = o.status === "confirmed" ? "ยืนยันแล้ว"
      : o.status === "rejected" ? "ปฏิเสธแล้ว"
      : "รอตรวจสอบ";

    const dateTxt = o.created_at ? new Date(o.created_at).toLocaleString("th-TH") : "-";
    const isPending = (o.status || "pending") === "pending";

    const slipHtml = o.slip_url
      ? '<img class="slip-img" src="' + o.slip_url + '" onclick="openLightbox(\'' + o.slip_url + '\')">'
      : '<div class="no-slip">ไม่มีรูปสลิปแนบมา</div>';

    const codeHtml = o.delivery_code
      ? '<div class="order-code">🔑 ' + o.delivery_code + '</div>'
      : '';

    return (
      '<div class="order-card">' +
        '<div class="order-top">' +
          '<div class="order-id">#' + o.id + ' · ' + dateTxt + '</div>' +
          '<div class="order-status ' + statusClass + '">' + statusLabel + '</div>' +
        '</div>' +
        '<div class="order-name">' + (o.product_name || "-") + '</div>' +
        '<div class="order-meta">จำนวน: ' + (o.quantity || 1) + ' ชิ้น</div>' +
        '<div class="order-meta">อีเมล: ' + (o.user_email || "guest") + '</div>' +
        '<div class="order-price">' + Number(o.price || 0).toLocaleString("de-DE") + ' กีบ</div>' +
        codeHtml +
        slipHtml +
        (isPending
          ? '<div class="btn-row">' +
              '<button class="btn-confirm" onclick="confirmOrder(\'' + o.id + '\',\'' + (o.product_name || '').replace(/'/g,"") + '\')">✅ ยืนยันออเดอร์</button>' +
              '<button class="btn-reject" onclick="updateStatus(\'' + o.id + '\',\'rejected\')">✕ ปฏิเสธ</button>' +
            '</div>'
          : '')
      +'</div>'
    );
  }).join("");
}

// ยืนยันออเดอร์ -> ลองดึงรหัสจากคลังก่อน ถ้าไม่มีให้พิมพ์เอง
async function confirmOrder(orderId, productName){
  let code = null;
  let stockCodeId = null;

  const { data: stockCode } = await supabaseClient
    .from("stock_codes")
    .select("id, code")
    .eq("product_name", productName)
    .eq("status", "available")
    .limit(1)
    .maybeSingle();

  if(stockCode){
    code = stockCode.code;
    stockCodeId = stockCode.id;
  } else {
    const typed = prompt(
      "⚠️ ไม่มีรหัสในคลังสำหรับ \"" + productName + "\"\nกรุณาใส่รหัส/ข้อมูลสินค้าด้วยมือ:"
    );
    if(typed === null) return; // กดยกเลิก
    if(!typed.trim()){
      alert("กรุณาใส่รหัสหรือข้อมูลสินค้า ห้ามเว้นว่าง");
      return;
    }
    code = typed.trim();
  }

  const {error} = await supabaseClient
    .from("orders")
    .update({ status: "confirmed", delivery_code: code })
    .eq("id", orderId);

  if(error){
    alert("อัปเดตไม่สำเร็จ: " + error.message);
    return;
  }

  // ถ้าดึงจากคลังมา ให้ตัดสต็อกออก (mark ว่าใช้แล้ว)
  if(stockCodeId){
    await supabaseClient
      .from("stock_codes")
      .update({ status: "used", order_id: orderId, used_at: new Date().toISOString() })
      .eq("id", stockCodeId);
  }

  loadOrders();
  loadStockSummary();
}

async function updateStatus(orderId, newStatus){
  const {error} = await supabaseClient
    .from("orders")
    .update({ status: newStatus })
    .eq("id", orderId);

  if(error){
    alert("อัปเดตไม่สำเร็จ: " + error.message);
    return;
  }

  loadOrders();
}

function openLightbox(url){
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").style.display = "flex";
}

document.querySelectorAll(".f-chip").forEach(function(chip){
  chip.addEventListener("click", function(){
    document.querySelectorAll(".f-chip").forEach(c => c.classList.remove("active"));
    this.classList.add("active");
    currentFilter = this.dataset.f;
    renderList();
  });
});

// ===============================
// คลังรหัสสินค้า
// ===============================

function toggleStockPanel(){
  const body = document.getElementById("stockBody");
  const icon = document.getElementById("stockToggleIcon");
  const isOpen = body.classList.toggle("open");
  icon.innerText = isOpen ? "▴" : "▾";
  if(isOpen) loadStockSummary();
}

async function addStockCodes(){
  const productName = document.getElementById("stockProductName").value.trim();
  const raw = document.getElementById("stockCodesInput").value;

  const codes = raw.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);

  if(!productName){
    alert("กรุณาใส่ชื่อสินค้า");
    return;
  }
  if(codes.length === 0){
    alert("กรุณาใส่รหัสอย่างน้อย 1 รายการ");
    return;
  }

  const rows = codes.map(function(c){
    return { product_name: productName, code: c, status: "available" };
  });

  const {error} = await supabaseClient.from("stock_codes").insert(rows);

  if(error){
    alert("เพิ่มรหัสไม่สำเร็จ: " + error.message);
    return;
  }

  alert("เพิ่มรหัสสำเร็จ " + codes.length + " รายการ สำหรับ \"" + productName + "\"");
  document.getElementById("stockCodesInput").value = "";
  loadStockSummary();
}

async function loadStockSummary(){
  const summaryEl = document.getElementById("stockSummary");
  summaryEl.innerHTML = "กำลังโหลด...";

  const {data, error} = await supabaseClient
    .from("stock_codes")
    .select("product_name, status")
    .eq("status", "available");

  if(error){
    summaryEl.innerHTML = "โหลดคลังไม่สำเร็จ: " + error.message;
    return;
  }

  const counts = {};
  (data || []).forEach(function(row){
    counts[row.product_name] = (counts[row.product_name] || 0) + 1;
  });

  const names = Object.keys(counts);
  if(names.length === 0){
    summaryEl.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">ยังไม่มีรหัสในคลัง</div>';
    return;
  }

  summaryEl.innerHTML = names.map(function(n){
    return '<div class="stock-row"><span>' + n + '</span><b>' + counts[n] + ' รหัส</b></div>';
  }).join("");
}

loadStockSummary();

</script>
</body>
</html>
