<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ອໍເດີ</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; }

:root{
  --bg:#0a0a0c;
  --card:#141417;
  --line:#28282e;
  --red:#ff2b45;
  --green:#3ddc73;
  --gold:#ffcf4d;
  --muted:#8b8b95;
}

body{ background:var(--bg); color:#fff; padding-bottom:40px; }

.topbar{
  padding:16px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.topbar h1{ font-size:18px; font-weight:700; }
.refresh-btn{
  background:var(--card);
  border:1px solid var(--line);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
}

.filters{
  display:flex;
  gap:8px;
  padding:14px 16px 0;
  overflow-x:auto;
}
.f-chip{
  flex-shrink:0;
  background:var(--card);
  border:1px solid var(--line);
  color:#ccc;
  padding:8px 16px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.f-chip.active{
  background:var(--red);
  border-color:var(--red);
  color:#fff;
  font-weight:600;
}

.list{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.order-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.order-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
}
.order-id{ font-size:11px; color:var(--muted); }
.order-status{
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  border-radius:12px;
}
.st-pending{ background:#3a2f0a; color:var(--gold); }
.st-confirmed{ background:#0a3a1c; color:var(--green); }
.st-rejected{ background:#3a0a0a; color:var(--red); }

.order-name{ font-size:16px; font-weight:700; margin-bottom:4px; }
.order-meta{ font-size:12.5px; color:var(--muted); margin-bottom:2px; }
.order-price{ font-size:18px; font-weight:800; color:var(--gold); margin:8px 0; }
.order-code{
  font-size:12.5px;
  color:var(--green);
  background:#0a0a0c;
  border:1px dashed var(--green);
  border-radius:8px;
  padding:8px 10px;
  margin:8px 0;
  word-break:break-all;
}

.slip-img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  background:#000;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:12px;
  cursor:pointer;
}
.no-slip{
  text-align:center;
  padding:20px;
  color:var(--muted);
  font-size:12.5px;
  border:1px dashed var(--line);
  border-radius:12px;
  margin-bottom:12px;
}

.btn-row{ display:flex; gap:10px; }
.btn-confirm, .btn-reject{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}
.btn-confirm{ background:linear-gradient(180deg,#4fe08a,#1ca652); color:#04150a; }
.btn-reject{ background:linear-gradient(180deg,#ff5a70,#c60f24); color:#fff; }
.btn-confirm:disabled, .btn-reject:disabled{ opacity:.35; cursor:default; }

.empty-msg{
  text-align:center;
  color:var(--muted);
  padding:60px 20px;
  font-size:13.5px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:#000d;
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.lightbox img{ max-width:100%; max-height:100%; border-radius:10px; }

/* ===== คลังรหัส ===== */
.stock-panel{
  margin:16px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}
.stock-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
}
.stock-head h2{ font-size:14.5px; }
.stock-body{ display:none; margin-top:14px; }
.stock-body.open{ display:block; }
.stock-body label{ font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
.stock-body input, .stock-body textarea, .stock-body select{
  width:100%;
  background:#0a0a0c;
  border:1px solid var(--line);
  border-radius:10px;
  color:#fff;
  padding:10px;
  font-size:13.5px;
  font-family:inherit;
  margin-bottom:12px;
}
.stock-body textarea{ min-height:100px; resize:vertical; }
.stock-add-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#4fe08a,#1ca652);
  color:#04150a;
  font-weight:700;
  font-size:13.5px;
  cursor:pointer;
  font-family:inherit;
}
.stock-summary{ margin-top:14px; border-top:1px solid var(--line); padding-top:12px; }
.stock-row{
  display:flex;
  justify-content:space-between;
  font-size:12.5px;
  padding:6px 0;
  color:#ccc;
}
.stock-row b{ color:var(--gold); }
</style>
</head>
<body>

<div class="topbar">
<h1>📋 ລາຍການອໍເດີ</h1>
<button class="refresh-btn" onclick="loadOrders()">🔄 ຣີເຟຣຊ</button>
</div>

<div class="filters">
<span class="f-chip active" data-f="all">ທັງໝົດ</span>
<span class="f-chip" data-f="pending">ລໍຖ້າກວດສອບ</span>
<span class="f-chip" data-f="confirmed">ຢືນຢັນແລ້ວ</span>
<span class="f-chip" data-f="rejected">ຖືກປະຕິເສດ</span>
</div>

<div class="stock-panel">
  <div class="stock-head" onclick="toggleStockPanel()">
    <h2>📦 ຄັງລະຫັດສິນຄ້າ</h2>
    <span id="stockToggleIcon">▾</span>
  </div>
  <div class="stock-body" id="stockBody">
    <label>ຊື່ສິນຄ້າ (ຕ້ອງພິມໃຫ້ກົງກັບຊື່ໃນໜ້າເວັບເປະໆ ເຊັ່ນ "PUBG Mobile")</label>
    <input type="text" id="stockProductName" placeholder="ເຊັ່ນ PUBG Mobile">

    <label>ໄລຍະເວລາ (ໃຊ້ສະເພາະສິນຄ້າໝວດມືຖືທີ່ມີ 5 ຕົວເລືອກ — ຖ້າເປັນສິນຄ້າທົ່ວໄປ ເລືອກ "ບໍ່ໃຊ້")</label>
    <select id="stockDuration">
      <option value="">ບໍ່ໃຊ້ (ສິນຄ້າທົ່ວໄປ)</option>
      <option value="1d">1 ວັນ</option>
      <option value="3d">3 ວັນ</option>
      <option value="7d">7 ວັນ</option>
      <option value="15d">15 ວັນ</option>
      <option value="30d">30 ວັນ</option>
    </select>

    <label>ລະຫັດ (1 ແຖວ = 1 ລະຫັດ ໃສ່ໄດ້ຫຼາຍອັນພ້ອມກັນ)</label>
    <textarea id="stockCodesInput" placeholder="ABCD-1234-XXXX&#10;EFGH-5678-YYYY&#10;..."></textarea>

    <button class="stock-add-btn" onclick="addStockCodes()">➕ ເພີ່ມເຂົ້າຄັງ</button>

    <div class="stock-summary" id="stockSummary"></div>
  </div>
</div>

<div class="stock-panel">
  <div class="stock-head" onclick="toggleImagePanel()">
    <h2>🖼️ ຮູບພາບສິນຄ້າ</h2>
    <span id="imageToggleIcon">▾</span>
  </div>
  <div class="stock-body" id="imageBody">
    <label>ຊື່ສິນຄ້າ (ຕ້ອງພິມໃຫ້ກົງກັບຊື່ໃນໜ້າເວັບເປະໆ ເຊັ່ນ "PUBG Mobile")</label>
    <input type="text" id="imgProductName" placeholder="ເຊັ່ນ PUBG Mobile">

    <label>ເລືອກຮູບຈາກເຄື່ອງ</label>
    <input type="file" id="imgFileInput" accept="image/*">

    <button class="stock-add-btn" id="imgUploadBtn" onclick="uploadProductImage()">⬆️ ອັບໂຫລດຮູບ</button>

    <div class="stock-summary" id="imageSummary"></div>
  </div>
</div>

<div class="stock-panel">
  <div class="stock-head" onclick="toggleProductInfoPanel()">
    <h2>🛠️ ແກ້ໄຂລາຄາ / ຊື່ / ຄຳບັນຍາຍສິນຄ້າ</h2>
    <span id="productInfoToggleIcon">▾</span>
  </div>
  <div class="stock-body" id="productInfoBody">
    <label>ຊື່ສິນຄ້າເດີມ (ຕ້ອງພິມໃຫ້ກົງກັບຊື່ໃນໜ້າເວັບເປະໆ ເຊັ່ນ "PUBG Mobile")</label>
    <input type="text" id="pinfoProductName" placeholder="ເຊັ່ນ PUBG Mobile">

    <label>ຊື່ທີ່ຈະໂຊວ໌ໃຫ້ລູກຄ້າເຫັນ (ຖ້າບໍ່ໃສ່ ຈະໂຊວ໌ຊື່ເດີມ)</label>
    <input type="text" id="pinfoDisplayName" placeholder="ເຊັ່ນ PUBG MOBILE (UC ແທ້ 100%)">

    <label>ລາຄາ (ກີບ) — ໃຊ້ສຳລັບສິນຄ້າທົ່ວໄປ</label>
    <input type="number" id="pinfoPrice" placeholder="ເຊັ່ນ 50000">

    <label>ລາຄາແບບເລືອກໄລຍະເວລາ (ໃສ່ສະເພາະສິນຄ້າໝວດມືຖືທີ່ຕ້ອງການໃຫ້ມີ 5 ຕົວເລືອກ — ຖ້າບໍ່ໃຊ້ປ່ອຍວ່າງໄວ້)</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <input type="number" id="pinfoPrice1d" placeholder="1 ວັນ">
      <input type="number" id="pinfoPrice3d" placeholder="3 ວັນ">
      <input type="number" id="pinfoPrice7d" placeholder="7 ວັນ">
      <input type="number" id="pinfoPrice15d" placeholder="15 ວັນ">
      <input type="number" id="pinfoPrice30d" placeholder="30 ວັນ">
    </div>

    <label>ຄຳບັນຍາຍສິນຄ້າ</label>
    <textarea id="pinfoDescription" placeholder="ລາຍລະອຽດ ວິທີໃຊ້ ຫຼື ຂໍ້ຄວນຮູ້ກ່ຽວກັບສິນຄ້ານີ້..."></textarea>

    <button class="stock-add-btn" onclick="saveProductInfo()">💾 ບັນທຶກ</button>

    <div class="stock-summary" id="productInfoSummary"></div>
  </div>
</div>

<div class="stock-panel">
  <div class="stock-head" onclick="toggleTopupPanel()">
    <h2>💰 ຄຳຂໍເຕີມເງິນ <span id="topupPendingBadge"></span></h2>
    <span id="topupToggleIcon">▾</span>
  </div>
  <div class="stock-body" id="topupBody">
    <div class="list" id="topupList" style="padding:0;">
      <div class="empty-msg">ກຳລັງໂຫລດ...</div>
    </div>
  </div>
</div>

<div class="list" id="orderList">
<div class="empty-msg">ກຳລັງໂຫລດ...</div>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script src="supabase.js"></script>
<script>

const ADMIN_EMAIL = "thongkeobeer@gmail.com";

let currentFilter = "all";
let allOrders = [];

(async function checkAdmin(){
  const {data:{user}} = await supabaseClient.auth.getUser();

  if(!user){
    alert("ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນ");
    location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("ໜ້ານີ້ສຳລັບແອດມິນເທົ່ານັ້ນ");
    location.href = "index.html";
    return;
  }

  loadOrders();
  loadTopups();
})();


async function loadOrders(){
  const list = document.getElementById("orderList");
  list.innerHTML = '<div class="empty-msg">ກຳລັງໂຫລດ...</div>';

  const {data, error} = await supabaseClient
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    list.innerHTML = '<div class="empty-msg">ໂຫລດບໍ່ສຳເລັດ: ' + error.message + '</div>';
    return;
  }

  allOrders = data || [];
  renderList();
}

function renderList(){
  const list = document.getElementById("orderList");
  const filtered = currentFilter === "all"
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-msg">ບໍ່ມີອໍເດີໃນໝວດນີ້</div>';
    return;
  }

  list.innerHTML = filtered.map(function(o){
    const statusClass = "st-" + (o.status || "pending");
    const statusLabel = o.status === "confirmed" ? "ຢືນຢັນແລ້ວ"
      : o.status === "rejected" ? "ຖືກປະຕິເສດ"
      : "ລໍຖ້າກວດສອບ";

    const dateTxt = o.created_at ? new Date(o.created_at).toLocaleString("th-TH") : "-";
    const isPending = (o.status || "pending") === "pending";

    const slipHtml = o.slip_url
      ? '<img class="slip-img" src="' + o.slip_url + '" onclick="openLightbox(\'' + o.slip_url + '\')">'
      : '<div class="no-slip">ບໍ່ມີຮູບສະລິບແນບມາ</div>';

    const codeHtml = o.delivery_code
      ? '<div class="order-code">🔑 ' + o.delivery_code + '</div>'
      : '';

    return (
      '<div class="order-card">' +
        '<div class="order-top">' +
          '<div class="order-id">#' + o.id + ' · ' + dateTxt + '</div>' +
          '<div class="order-status ' + statusClass + '">' + statusLabel + '</div>' +
        '</div>' +
        '<div class="order-name">' + (o.product_name || "-") + '</div>' +
        '<div class="order-meta">ຈຳນວນ: ' + (o.quantity || 1) + ' ອັນ</div>' +
        '<div class="order-meta">ອີເມວ: ' + (o.user_email || "guest") + '</div>' +
        '<div class="order-price">' + Number(o.price || 0).toLocaleString("de-DE") + ' ກີບ</div>' +
        codeHtml +
        slipHtml +
        (isPending
          ? '<div class="btn-row">' +
              '<button class="btn-confirm" onclick="confirmOrder(\'' + o.id + '\',\'' + (o.product_name || '').replace(/'/g,"") + '\')">✅ ຢືນຢັນອໍເດີ</button>' +
              '<button class="btn-reject" onclick="updateStatus(\'' + o.id + '\',\'rejected\')">✕ ປະຕິເສດ</button>' +
            '</div>'
          : '')
      +'</div>'
    );
  }).join("");
}

// ยืนยันออเดอร์ -> ลองดึงรหัสจากคลังก่อน ถ้าไม่มีให้พิมพ์เอง
async function confirmOrder(orderId, productName){
  let code = null;
  let stockCodeId = null;
  const cleanName = (productName || "").trim();

  const { data: stockCode } = await supabaseClient
    .from("stock_codes")
    .select("id, code")
    .ilike("product_name", cleanName)
    .eq("status", "available")
    .limit(1)
    .maybeSingle();

  if(stockCode){
    code = stockCode.code;
    stockCodeId = stockCode.id;
  } else {
    const typed = prompt(
      "⚠️ ບໍ່ມີລະຫັດໃນຄັງສຳລັບ \"" + productName + "\"\nກະລຸນາໃສ່ລະຫັດ/ຂໍ້ມູນສິນຄ້າດ້ວຍມື:"
    );
    if(typed === null) return; // กดยกเลิก
    if(!typed.trim()){
      alert("ກະລຸນາໃສ່ລະຫັດ ຫຼື ຂໍ້ມູນສິນຄ້າ ຫ້າມເວັ້ນຫວ່າງ");
      return;
    }
    code = typed.trim();
  }

  const {error} = await supabaseClient
    .from("orders")
    .update({ status: "confirmed", delivery_code: code })
    .eq("id", orderId);

  if(error){
    alert("ອັບເດດບໍ່ສຳເລັດ: " + error.message);
    return;
  }

  // ถ้าดึงจากคลังมา ให้ตัดสต็อกออก (mark ว่าใช้แล้ว)
  if(stockCodeId){
    await supabaseClient
      .from("stock_codes")
      .update({ status: "used", order_id: orderId, used_at: new Date().toISOString() })
      .eq("id", stockCodeId);
  }

  loadOrders();
  loadStockSummary();
}

async function updateStatus(orderId, newStatus){
  const {error} = await supabaseClient
    .from("orders")
    .update({ status: newStatus })
    .eq("id", orderId);

  if(error){
    alert("ອັບເດດບໍ່ສຳເລັດ: " + error.message);
    return;
  }

  loadOrders();
}

function openLightbox(url){
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").style.display = "flex";
}

document.querySelectorAll(".f-chip").forEach(function(chip){
  chip.addEventListener("click", function(){
    document.querySelectorAll(".f-chip").forEach(c => c.classList.remove("active"));
    this.classList.add("active");
    currentFilter = this.dataset.f;
    renderList();
  });
});

// ===============================
// คลังรหัสสินค้า
// ===============================

function toggleStockPanel(){
  const body = document.getElementById("stockBody");
  const icon = document.getElementById("stockToggleIcon");
  const isOpen = body.classList.toggle("open");
  icon.innerText = isOpen ? "▴" : "▾";
  if(isOpen) loadStockSummary();
}

async function addStockCodes(){
  const baseProductName = document.getElementById("stockProductName").value.trim();
  const durationVal = document.getElementById("stockDuration").value;
  const productName = durationVal ? (baseProductName + " [" + durationVal + "]") : baseProductName;
  const raw = document.getElementById("stockCodesInput").value;

  const codes = raw.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);

  if(!baseProductName){
    alert("ກະລຸນາໃສ່ຊື່ສິນຄ້າ");
    return;
  }
  if(codes.length === 0){
    alert("ກະລຸນາໃສ່ລະຫັດຢ່າງໜ້ອຍ 1 ລາຍການ");
    return;
  }

  const rows = codes.map(function(c){
    return { product_name: productName, code: c, status: "available" };
  });

  const {error} = await supabaseClient.from("stock_codes").insert(rows);

  if(error){
    alert("ເພີ່ມລະຫັດບໍ່ສຳເລັດ: " + error.message);
    return;
  }

  alert("ເພີ່ມລະຫັດສຳເລັດ " + codes.length + " ລາຍການ ສຳລັບ \"" + productName + "\"");
  document.getElementById("stockCodesInput").value = "";
  document.getElementById("stockDuration").value = "";
  loadStockSummary();
}

async function loadStockSummary(){
  const summaryEl = document.getElementById("stockSummary");
  summaryEl.innerHTML = "ກຳລັງໂຫລດ...";

  const {data, error} = await supabaseClient
    .from("stock_codes")
    .select("product_name, status")
    .eq("status", "available");

  if(error){
    summaryEl.innerHTML = "ໂຫລດຄັງບໍ່ສຳເລັດ: " + error.message;
    return;
  }

  const counts = {};
  (data || []).forEach(function(row){
    counts[row.product_name] = (counts[row.product_name] || 0) + 1;
  });

  const names = Object.keys(counts);
  if(names.length === 0){
    summaryEl.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">ຍັງບໍ່ມີລະຫັດໃນຄັງ</div>';
    return;
  }

  summaryEl.innerHTML = names.map(function(n){
    return '<div class="stock-row"><span>' + n + '</span><b>' + counts[n] + ' ລະຫັດ</b></div>';
  }).join("");
}

loadStockSummary();

function toggleImagePanel(){

async function uploadProductImage(){
  const productName = document.getElementById("imgProductName").value.trim();
  const fileInput = document.getElementById("imgFileInput");
  const file = fileInput.files[0];
  const btn = document.getElementById("imgUploadBtn");

  if(!productName){
    alert("ກະລຸນາໃສ່ຊື່ສິນຄ້າ");
    return;
  }
  if(!file){
    alert("ກະລຸນາເລືອກຮູບກ່ອນ");
    return;
  }

  btn.disabled = true;
  btn.innerText = "ກຳລັງອັບໂຫລດ...";

  try{
    const ext = file.name.split(".").pop();
    const path = productName.replace(/[^a-zA-Z0-9ก-๙]/g, "_") + "-" + Date.now() + "." + ext;

    const { error: uploadError } = await supabaseClient
      .storage
      .from("product-images")
      .upload(path, file, { upsert: true });

    if(uploadError){
      alert("ອັບໂຫລດຮູບບໍ່ສຳເລັດ: " + uploadError.message);
      return;
    }

    const { data: urlData } = supabaseClient
      .storage
      .from("product-images")
      .getPublicUrl(path);

    const { error: dbError } = await supabaseClient
      .from("product_images")
      .upsert(
        { product_name: productName, image_url: urlData.publicUrl },
        { onConflict: "product_name" }
      );

    if(dbError){
      alert("ບັນທຶກຮູບບໍ່ສຳເລັດ: " + dbError.message);
      return;
    }

    alert("ອັບໂຫລດຮູບສຳເລັດສຳລັບ \"" + productName + "\"");
    fileInput.value = "";
    document.getElementById("imgProductName").value = "";
    loadImageSummary();
  } finally {
    btn.disabled = false;
    btn.innerText = "⬆️ ອັບໂຫລດຮູບ";
  }
}

async function loadImageSummary(){
  const summaryEl = document.getElementById("imageSummary");
  summaryEl.innerHTML = "ກຳລັງໂຫລດ...";

  const {data, error} = await supabaseClient
    .from("product_images")
    .select("product_name, image_url")
    .order("created_at", { ascending: false });

  if(error){
    summaryEl.innerHTML = "ໂຫລດລາຍການຮູບບໍ່ສຳເລັດ: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    summaryEl.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">ຍັງບໍ່ມີຮູບສິນຄ້າ</div>';
    return;
  }

  summaryEl.innerHTML = data.map(function(row){
    return (
      '<div class="stock-row" style="align-items:center;">' +
        '<span style="display:flex;align-items:center;gap:8px;">' +
          '<img src="' + row.image_url + '" style="width:28px;height:28px;border-radius:6px;object-fit:cover;">' +
          row.product_name +
        '</span>' +
      '</div>'
    );
  }).join("");
}

// ແກ້ໄຂລາຄາ / ຊື່ / ຄຳບັນຍາຍສິນຄ້າ

function toggleProductInfoPanel(){
  const body = document.getElementById("productInfoBody");
  const icon = document.getElementById("productInfoToggleIcon");
  const isOpen = body.classList.toggle("open");
  icon.innerText = isOpen ? "▴" : "▾";
  if(isOpen) loadProductInfoSummary();
}

async function saveProductInfo(){
  const productName = document.getElementById("pinfoProductName").value.trim();
  const displayName = document.getElementById("pinfoDisplayName").value.trim();
  const priceRaw = document.getElementById("pinfoPrice").value.trim();
  const description = document.getElementById("pinfoDescription").value.trim();
  const p1d = document.getElementById("pinfoPrice1d").value.trim();
  const p3d = document.getElementById("pinfoPrice3d").value.trim();
  const p7d = document.getElementById("pinfoPrice7d").value.trim();
  const p15d = document.getElementById("pinfoPrice15d").value.trim();
  const p30d = document.getElementById("pinfoPrice30d").value.trim();

  if(!productName){
    alert("ກະລຸນາໃສ່ຊື່ສິນຄ້າເດີມ");
    return;
  }

  const row = { product_name: productName, updated_at: new Date().toISOString() };
  row.display_name = displayName ? displayName : null;
  row.price = priceRaw ? Number(priceRaw) : null;
  row.description = description ? description : null;
  row.price_1d = p1d ? Number(p1d) : null;
  row.price_3d = p3d ? Number(p3d) : null;
  row.price_7d = p7d ? Number(p7d) : null;
  row.price_15d = p15d ? Number(p15d) : null;
  row.price_30d = p30d ? Number(p30d) : null;

  const { error } = await supabaseClient
    .from("product_overrides")
    .upsert(row, { onConflict: "product_name" });

  if(error){
    alert("ບັນທຶກບໍ່ສຳເລັດ: " + error.message);
    return;
  }

  alert("ບັນທຶກສຳເລັດສຳລັບ \"" + productName + "\"");
  document.getElementById("pinfoProductName").value = "";
  document.getElementById("pinfoDisplayName").value = "";
  document.getElementById("pinfoPrice").value = "";
  document.getElementById("pinfoDescription").value = "";
  document.getElementById("pinfoPrice1d").value = "";
  document.getElementById("pinfoPrice3d").value = "";
  document.getElementById("pinfoPrice7d").value = "";
  document.getElementById("pinfoPrice15d").value = "";
  document.getElementById("pinfoPrice30d").value = "";
  loadProductInfoSummary();
}

async function loadProductInfoSummary(){
  const summaryEl = document.getElementById("productInfoSummary");
  summaryEl.innerHTML = "ກຳລັງໂຫລດ...";

  const { data, error } = await supabaseClient
    .from("product_overrides")
    .select("product_name, display_name, price, description")
    .order("updated_at", { ascending: false });

  if(error){
    summaryEl.innerHTML = "ໂຫລດບໍ່ສຳເລັດ: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    summaryEl.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">ຍັງບໍ່ໄດ້ຕັ້ງຄ່າສິນຄ້າໃດເລີຍ</div>';
    return;
  }

  summaryEl.innerHTML = data.map(function(row){
    const shown = row.display_name || row.product_name;
    const priceTxt = (row.price !== null && row.price !== undefined)
      ? Number(row.price).toLocaleString("de-DE") + " ກີບ"
      : "ຍັງບໍ່ຕັ້ງລາຄາ";
    return (
      '<div class="stock-row" style="align-items:flex-start;cursor:pointer;" onclick="editProductInfo(\'' +
        row.product_name.replace(/'/g,"") + '\')">' +
        '<span>' + shown + ' <span style="color:var(--muted);">(' + row.product_name + ')</span></span>' +
        '<b>' + priceTxt + '</b>' +
      '</div>'
    );
  }).join("");
}

async function editProductInfo(productName){
  const { data, error } = await supabaseClient
    .from("product_overrides")
    .select("product_name, display_name, price, description, price_1d, price_3d, price_7d, price_15d, price_30d")
    .eq("product_name", productName)
    .maybeSingle();

  if(error || !data) return;

  document.getElementById("pinfoProductName").value = data.product_name || "";
  document.getElementById("pinfoDisplayName").value = data.display_name || "";
  document.getElementById("pinfoPrice").value = (data.price !== null && data.price !== undefined) ? data.price : "";
  document.getElementById("pinfoDescription").value = data.description || "";
  document.getElementById("pinfoPrice1d").value = (data.price_1d !== null && data.price_1d !== undefined) ? data.price_1d : "";
  document.getElementById("pinfoPrice3d").value = (data.price_3d !== null && data.price_3d !== undefined) ? data.price_3d : "";
  document.getElementById("pinfoPrice7d").value = (data.price_7d !== null && data.price_7d !== undefined) ? data.price_7d : "";
  document.getElementById("pinfoPrice15d").value = (data.price_15d !== null && data.price_15d !== undefined) ? data.price_15d : "";
  document.getElementById("pinfoPrice30d").value = (data.price_30d !== null && data.price_30d !== undefined) ? data.price_30d : "";
}

// คำขอเติมเงิน (topup_requests)
// ===============================

function toggleTopupPanel(){
  const body = document.getElementById("topupBody");
  const icon = document.getElementById("topupToggleIcon");
  const isOpen = body.classList.toggle("open");
  icon.innerText = isOpen ? "▴" : "▾";
  if(isOpen) loadTopups();
}

async function loadTopups(){
  const list = document.getElementById("topupList");
  const badge = document.getElementById("topupPendingBadge");

  const {data, error} = await supabaseClient
    .from("topup_requests")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    list.innerHTML = '<div class="empty-msg">ໂຫລດບໍ່ສຳເລັດ: ' + error.message + '</div>';
    return;
  }

  const pending = (data || []).filter(function(t){ return t.status === "pending"; });
  badge.innerText = pending.length > 0 ? "(" + pending.length + " ລໍຖ້າກວດສອບ)" : "";

  if(!data || data.length === 0){
    list.innerHTML = '<div class="empty-msg">ຍັງບໍ່ມີຄຳຂໍເຕີມເງິນ</div>';
    return;
  }

  list.innerHTML = data.map(function(t){
    const statusClass = "st-" + (t.status || "pending");
    const statusLabel = t.status === "confirmed" ? "ຢືນຢັນແລ້ວ"
      : t.status === "rejected" ? "ຖືກປະຕິເສດ"
      : "ລໍຖ້າກວດສອບ";
    const dateTxt = t.created_at ? new Date(t.created_at).toLocaleString("th-TH") : "-";
    const isPending = (t.status || "pending") === "pending";

    const slipHtml = t.slip_url
      ? '<img class="slip-img" src="' + t.slip_url + '" onclick="openLightbox(\'' + t.slip_url + '\')">'
      : '<div class="no-slip">ບໍ່ມີຮູບສະລິບແນບມາ</div>';

    return (
      '<div class="order-card">' +
        '<div class="order-top">' +
          '<div class="order-id">#' + t.id + ' · ' + dateTxt + '</div>' +
          '<div class="order-status ' + statusClass + '">' + statusLabel + '</div>' +
        '</div>' +
        '<div class="order-name">💰 ເຕີມເງິນ</div>' +
        '<div class="order-meta">ອີເມວ: ' + (t.user_email || "guest") + '</div>' +
        '<div class="order-price">' + Number(t.amount || 0).toLocaleString("de-DE") + ' ກີບ</div>' +
        slipHtml +
        (isPending
          ? '<div class="btn-row">' +
              '<button class="btn-confirm" onclick="confirmTopup(\'' + t.id + '\')">✅ ຢືນຢັນ + ເຕີມເງິນ</button>' +
              '<button class="btn-reject" onclick="rejectTopup(\'' + t.id + '\')">✕ ປະຕິເສດ</button>' +
            '</div>'
          : '')
      + '</div>'
    );
  }).join("");
}

async function confirmTopup(topupId){
  const {error} = await supabaseClient.rpc("confirm_topup", { p_topup_id: topupId });
  if(error){
    alert("ຢືນຢັນບໍ່ສຳເລັດ: " + error.message);
    return;
  }
  loadTopups();
}

async function rejectTopup(topupId){
  const {error} = await supabaseClient.rpc("reject_topup", { p_topup_id: topupId });
  if(error){
    alert("ປະຕິເສດບໍ່ສຳເລັດ: " + error.message);
    return;
  }
  loadTopups();
}
