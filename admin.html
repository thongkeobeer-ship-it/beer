<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ออเดอร์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; }

:root{
  --bg:#0a0a0c;
  --card:#141417;
  --line:#28282e;
  --red:#ff2b45;
  --green:#3ddc73;
  --gold:#ffcf4d;
  --muted:#8b8b95;
}

body{ background:var(--bg); color:#fff; padding-bottom:40px; }

.topbar{
  padding:16px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.topbar h1{ font-size:18px; font-weight:700; }
.refresh-btn{
  background:var(--card);
  border:1px solid var(--line);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
}

.filters{
  display:flex;
  gap:8px;
  padding:14px 16px 0;
  overflow-x:auto;
}
.f-chip{
  flex-shrink:0;
  background:var(--card);
  border:1px solid var(--line);
  color:#ccc;
  padding:8px 16px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.f-chip.active{
  background:var(--red);
  border-color:var(--red);
  color:#fff;
  font-weight:600;
}

.list{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.order-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}

.order-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
}
.order-id{ font-size:11px; color:var(--muted); }
.order-status{
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  border-radius:12px;
}
.st-pending{ background:#3a2f0a; color:var(--gold); }
.st-confirmed{ background:#0a3a1c; color:var(--green); }
.st-rejected{ background:#3a0a0a; color:var(--red); }

.order-name{ font-size:16px; font-weight:700; margin-bottom:4px; }
.order-meta{ font-size:12.5px; color:var(--muted); margin-bottom:2px; }
.order-price{ font-size:18px; font-weight:800; color:var(--gold); margin:8px 0; }

.slip-img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  background:#000;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:12px;
  cursor:pointer;
}
.no-slip{
  text-align:center;
  padding:20px;
  color:var(--muted);
  font-size:12.5px;
  border:1px dashed var(--line);
  border-radius:12px;
  margin-bottom:12px;
}

.btn-row{ display:flex; gap:10px; }
.btn-confirm, .btn-reject{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
}
.btn-confirm{ background:linear-gradient(180deg,#4fe08a,#1ca652); color:#04150a; }
.btn-reject{ background:linear-gradient(180deg,#ff5a70,#c60f24); color:#fff; }
.btn-confirm:disabled, .btn-reject:disabled{ opacity:.35; cursor:default; }

.empty-msg{
  text-align:center;
  color:var(--muted);
  padding:60px 20px;
  font-size:13.5px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:#000d;
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.lightbox img{ max-width:100%; max-height:100%; border-radius:10px; }
</style>
</head>
<body>

<div class="topbar">
<h1>📋 รายการออเดอร์</h1>
<button class="refresh-btn" onclick="loadOrders()">🔄 รีเฟรช</button>
</div>

<div class="filters">
<span class="f-chip active" data-f="all">ทั้งหมด</span>
<span class="f-chip" data-f="pending">รอตรวจสอบ</span>
<span class="f-chip" data-f="confirmed">ยืนยันแล้ว</span>
<span class="f-chip" data-f="rejected">ปฏิเสธแล้ว</span>
</div>

<div class="list" id="orderList">
<div class="empty-msg">กำลังโหลด...</div>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script src="supabase.js"></script>
<script>

const ADMIN_EMAIL = "thongkeobeer@gmail.com";

let currentFilter = "all";
let allOrders = [];

(async function checkAdmin(){
  const {data:{user}} = await supabaseClient.auth.getUser();

  if(!user){
    alert("กรุณาล็อกอินก่อน");
    location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("หน้านี้สำหรับแอดมินเท่านั้น");
    location.href = "index.html";
    return;
  }

  loadOrders();
})();


async function loadOrders(){
  const list = document.getElementById("orderList");
  list.innerHTML = '<div class="empty-msg">กำลังโหลด...</div>';

  const {data, error} = await supabaseClient
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    list.innerHTML = '<div class="empty-msg">โหลดไม่สำเร็จ: ' + error.message + '</div>';
    return;
  }

  allOrders = data || [];
  renderList();
}

function renderList(){
  const list = document.getElementById("orderList");
  const filtered = currentFilter === "all"
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-msg">ไม่มีออเดอร์ในหมวดนี้</div>';
    return;
  }

  list.innerHTML = filtered.map(function(o){
    const statusClass = "st-" + (o.status || "pending");
    const statusLabel = o.status === "confirmed" ? "ยืนยันแล้ว"
      : o.status === "rejected" ? "ปฏิเสธแล้ว"
      : "รอตรวจสอบ";

    const dateTxt = o.created_at ? new Date(o.created_at).toLocaleString("th-TH") : "-";
    const isPending = (o.status || "pending") === "pending";

    const slipHtml = o.slip_url
      ? '<img class="slip-img" src="' + o.slip_url + '" onclick="openLightbox(\'' + o.slip_url + '\')">'
      : '<div class="no-slip">ไม่มีรูปสลิปแนบมา</div>';

    return (
      '<div class="order-card">' +
        '<div class="order-top">' +
          '<div class="order-id">#' + o.id + ' · ' + dateTxt + '</div>' +
          '<div class="order-status ' + statusClass + '">' + statusLabel + '</div>' +
        '</div>' +
        '<div class="order-name">' + (o.product_name || "-") + '</div>' +
        '<div class="order-meta">จำนวน: ' + (o.quantity || 1) + ' ชิ้น</div>' +
        '<div class="order-meta">อีเมล: ' + (o.user_email || "guest") + '</div>' +
        '<div class="order-price">' + Number(o.price || 0).toLocaleString("de-DE") + ' กีบ</div>' +
        slipHtml +
        (isPending
          ? '<div class="btn-row">' +
              '<button class="btn-confirm" onclick="updateStatus(' + o.id + ',\'confirmed\')">✅ ยืนยันออเดอร์</button>' +
              '<button class="btn-reject" onclick="updateStatus(' + o.id + ',\'rejected\')">✕ ปฏิเสธ</button>' +
            '</div>'
          : '')
      +'</div>'
    );
  }).join("");
}

async function updateStatus(orderId, newStatus){
  const {error} = await supabaseClient
    .from("orders")
    .update({ status: newStatus })
    .eq("id", orderId);

  if(error){
    alert("อัปเดตไม่สำเร็จ: " + error.message);
    return;
  }

  loadOrders();
}

function openLightbox(url){
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").style.display = "flex";
}

document.querySelectorAll(".f-chip").forEach(function(chip){
  chip.addEventListener("click", function(){
    document.querySelectorAll(".f-chip").forEach(c => c.classList.remove("active"));
    this.classList.add("active");
    currentFilter = this.dataset.f;
    renderList();
  });
});

</script>
</body>
</html>
