<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ - 𝐃𝐄𝐊 𝐌𝐀𝐒𝐇 𝐒𝐇𝐎𝐏</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }

:root{
  --bg:#0a0e16;
  --card:#12161f;
  --line:#1c2733;
  --red:#ff4d4d;
  --red2:#ff8080;
  --green:#3ddc9a;
  --muted:#9db4c7;
  --gold:#ffd873;
}
.num{ font-family:'Orbitron',sans-serif; }

body{
  background-image: radial-gradient(circle at 15% 0%, rgba(255,77,77,.07), transparent 40%);
  background-color:var(--bg);
  background-repeat:no-repeat;
  background-size:220% 220%;
  animation:bgGlowDrift 18s ease-in-out infinite;
  color:#fff;
  padding-bottom:50px;
}
@keyframes bgGlowDrift{
  0%,100%{ background-position:0% 0%; }
  50%{ background-position:24% 18%; }
}
@media (prefers-reduced-motion: reduce){ body{ animation:none; } }

.topbar{
  display:flex; align-items:center; gap:12px;
  padding:16px; position:sticky; top:0;
  background:rgba(10,14,22,.85);
  backdrop-filter:blur(14px);
  z-index:50;
  border-bottom:1px solid var(--line);
}
.back-btn{
  width:38px; height:38px; border-radius:50%;
  background:var(--card); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; font-size:18px; flex-shrink:0;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.back-btn:active{ transform:scale(.9); }
.topbar-title{ font-weight:700; font-size:16px; }

.wrap{ max-width:480px; margin:0 auto; padding:16px; }

.center-msg{ text-align:center; color:var(--muted); padding:60px 20px; font-size:13.5px; }

/* ===== Avatar + nickname card ===== */
.profile-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:26px 18px;
  text-align:center;
  margin-bottom:16px;
}
.avatar-big{
  width:96px; height:96px;
  border-radius:50%;
  background:linear-gradient(160deg,#1a0d05,#12161f);
  border:2px solid var(--red);
  box-shadow:0 0 22px rgba(255,77,77,.35);
  display:flex; align-items:center; justify-content:center;
  font-size:46px;
  margin:0 auto 12px;
}
.avatar-big img{
  width:100%; height:100%;
  object-fit:cover;
  border-radius:50%;
  display:block;
}

/* ===== กรอบโปรไฟล์ตามยอดเติม (แทนเหรียญยศ) ===== */
.avatar-frame-wrap{
  position:relative;
  width:122px; height:122px;
  margin:0 auto 22px;
  display:flex; align-items:center; justify-content:center;
}
.avatar-frame-wrap .avatar-big{
  margin:0;
  position:relative;
  z-index:3;
  border-color:transparent;
  overflow:hidden;
}
/* ประกายเงาวิ่งผ่านตัวอวตาร์ ให้ดูมันวาวคล้ายเหรียญขัดเงา */
.avatar-frame-wrap .avatar-big::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.32) 48%, transparent 64%);
  background-size:220% 220%;
  animation:avatarShine 3.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes avatarShine{
  0%{ background-position:130% 130%; }
  50%{ background-position:10% 10%; }
  100%{ background-position:130% 130%; }
}
/* แสงเรืองฟุ้งด้านหลัง หายใจเข้าออกเบาๆ */
.avatar-frame-wrap::after{
  content:"";
  position:absolute;
  inset:-16px;
  border-radius:50%;
  z-index:0;
  filter:blur(11px);
  animation:frameGlowPulse 2.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes frameGlowPulse{
  0%,100%{ opacity:.4; transform:scale(.95); }
  50%{ opacity:.8; transform:scale(1.06); }
}
/* วงแหวนหมุน — มีแถบสว่าง 2 จุดให้ดูเหมือนโลหะขัดมัน */
.avatar-frame-wrap::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  z-index:1;
  animation:frameSpin 5s linear infinite;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
}
@keyframes frameSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce){
  .avatar-frame-wrap .avatar-big::after{ animation:none; }
}

/* 20.000 กีบ — ขาวมุก */
.frame-white::before{
  background:conic-gradient(from 0deg,
    #8b95a1 0%, #ffffff 12%, #ffffff 20%, #8b95a1 35%,
    #565e68 50%, #ffffff 65%, #ffffff 73%, #8b95a1 88%, #8b95a1 100%);
}
.frame-white::after{ background:radial-gradient(circle, rgba(255,255,255,.55), transparent 70%); }
.frame-white .avatar-big{ box-shadow:0 0 18px rgba(255,255,255,.55); }

/* 100.000 กีบ — ฟ้าน้ำแข็ง */
.frame-blue::before{
  background:conic-gradient(from 0deg,
    #0d5a8c 0%, #7fe0ff 12%, #eaffff 20%, #4dc3ff 35%,
    #0d5a8c 50%, #7fe0ff 65%, #eaffff 73%, #1a7fc4 88%, #0d5a8c 100%);
  animation-duration:5.5s;
}
.frame-blue::after{ background:radial-gradient(circle, rgba(77,195,255,.55), transparent 70%); }
.frame-blue .avatar-big{ box-shadow:0 0 20px rgba(77,195,255,.6); }

/* 300.000 กีบ — แดง + สายฟ้า */
.frame-red::before{
  background:conic-gradient(from 0deg,
    #6b0d14 0%, #ff8080 12%, #fff0f0 20%, #ff4d4d 35%,
    #6b0d14 50%, #ff8080 65%, #fff0f0 73%, #b3121f 88%, #6b0d14 100%);
  animation-duration:4.2s;
}
.frame-red::after{ background:radial-gradient(circle, rgba(255,77,77,.6), transparent 70%); }
.frame-red .avatar-big{ box-shadow:0 0 22px rgba(255,77,77,.65); }
.lightning-bolt{
  position:absolute;
  font-size:17px;
  z-index:4;
  opacity:0;
  animation:boltFlicker 1.8s ease-in-out infinite;
  filter:drop-shadow(0 0 6px #ff4d4d) drop-shadow(0 0 3px #fff);
}
@keyframes boltFlicker{
  0%,100%{ opacity:0; }
  8%,18%{ opacity:1; }
  26%{ opacity:0; }
  55%,68%{ opacity:1; }
  78%{ opacity:0; }
}

/* 600.000 กีบ — เทา/เงิน + อนุภาคลอย */
.frame-gray::before{
  background:conic-gradient(from 0deg,
    #3d4650 0%, #f2f6fa 12%, #ffffff 20%, #c8d2e0 35%,
    #3d4650 50%, #f2f6fa 65%, #ffffff 73%, #5c6b78 88%, #3d4650 100%);
  animation-duration:6s;
}
.frame-gray::after{ background:radial-gradient(circle, rgba(200,210,225,.6), transparent 70%); }
.frame-gray .avatar-big{ box-shadow:0 0 20px rgba(200,210,225,.6); }
.silver-particle{
  position:absolute;
  width:5px; height:5px;
  border-radius:50%;
  background:#eef3f8;
  box-shadow:0 0 6px #dfe8f0, 0 0 2px #fff;
  z-index:4;
  opacity:0;
  animation:particleFloat 3.2s ease-in infinite;
}
@keyframes particleFloat{
  0%{ transform:translateY(0) scale(1); opacity:0; }
  15%{ opacity:1; }
  100%{ transform:translateY(-42px) scale(.25); opacity:0; }
}

/* 1.000.000 กีบ — ม่วง+ทอง + มงกุฎขยับขึ้นลง + เอฟเฟกต์พรีเมียมเต็มขั้น */
.frame-royal::before{
  background:conic-gradient(from 0deg,
    #4a1a80 0%, #ffd873 10%, #fff3d0 16%, #b366ff 30%,
    #4a1a80 45%, #ffd873 60%, #fff3d0 66%, #6a1fd0 80%, #4a1a80 100%);
  animation:frameSpin 3.8s linear infinite, royalHueShift 6s linear infinite;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15), 0 0 10px rgba(255,215,115,.4);
}
@keyframes royalHueShift{
  0%{ filter:hue-rotate(0deg) saturate(1); }
  50%{ filter:hue-rotate(35deg) saturate(1.3); }
  100%{ filter:hue-rotate(0deg) saturate(1); }
}
.frame-royal::after{
  background:radial-gradient(circle, rgba(179,102,255,.6) 0%, rgba(255,215,115,.45) 55%, transparent 78%);
  animation:frameGlowPulse 1.8s ease-in-out infinite;
}
.frame-royal .avatar-big{
  box-shadow:
    0 0 22px rgba(179,102,255,.65),
    0 0 34px rgba(255,215,115,.5),
    0 0 46px rgba(179,102,255,.3);
}

/* วงแหวนบางซ้อนชั้นใน หมุนสวนทาง ให้ดูมีมิติแบบเหรียญรางวัลระดับสูง */
.frame-royal-innerring{
  position:absolute;
  inset:9px;
  border-radius:50%;
  z-index:2;
  padding:2px;
  background:conic-gradient(from 180deg, #ffd873, transparent 25%, #b366ff, transparent 55%, #ffd873, transparent 85%, #b366ff);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  animation:frameSpin 2.6s linear infinite reverse;
  pointer-events:none;
  opacity:.85;
}

/* รังสีแสงพุ่งออกจากศูนย์กลาง หมุนช้าๆ อยู่ชั้นหลังสุด ให้ดูเหมือนออร่าเปล่งประกาย */
.frame-royal-rays{
  position:absolute;
  inset:-34px;
  z-index:0;
  border-radius:50%;
  pointer-events:none;
  background:conic-gradient(from 0deg,
    transparent 0deg, rgba(255,215,115,.4) 4deg, transparent 10deg,
    transparent 34deg, rgba(179,102,255,.35) 38deg, transparent 44deg,
    transparent 68deg, rgba(255,215,115,.4) 72deg, transparent 78deg,
    transparent 102deg, rgba(179,102,255,.35) 106deg, transparent 112deg,
    transparent 136deg, rgba(255,215,115,.4) 140deg, transparent 146deg,
    transparent 170deg, rgba(179,102,255,.35) 174deg, transparent 180deg,
    transparent 204deg, rgba(255,215,115,.4) 208deg, transparent 214deg,
    transparent 238deg, rgba(179,102,255,.35) 242deg, transparent 248deg,
    transparent 272deg, rgba(255,215,115,.4) 276deg, transparent 282deg,
    transparent 306deg, rgba(179,102,255,.35) 310deg, transparent 316deg,
    transparent 340deg, rgba(255,215,115,.4) 344deg, transparent 350deg);
  animation:royalRaysSpin 9s linear infinite;
  mix-blend-mode:screen;
}
@keyframes royalRaysSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

/* ประกายดาวกระพริบรอบกรอบ */
.royal-sparkle{
  position:absolute;
  font-size:13px;
  z-index:5;
  opacity:0;
  animation:royalSparkleTwinkle 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 5px #ffd873) drop-shadow(0 0 7px #b366ff);
}
@keyframes royalSparkleTwinkle{
  0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
  45%{ opacity:1; transform:scale(1.15) rotate(180deg); }
  60%{ opacity:.7; transform:scale(.9) rotate(220deg); }
}

.frame-crown-icon{
  position:absolute;
  top:-26px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  z-index:6;
  animation:crownBob 2s ease-in-out infinite, crownGlowPulse 1.6s ease-in-out infinite;
}
@keyframes crownBob{
  0%,100%{ transform:translateX(-50%) translateY(0) rotate(-5deg); }
  50%{ transform:translateX(-50%) translateY(-6px) rotate(5deg); }
}
@keyframes crownGlowPulse{
  0%,100%{ filter:drop-shadow(0 0 7px rgba(255,215,115,.75)) drop-shadow(0 0 3px rgba(179,102,255,.6)); }
  50%{ filter:drop-shadow(0 0 13px rgba(255,215,115,1)) drop-shadow(0 0 8px rgba(179,102,255,.9)); }
}

/* ป้าย VIP ใต้อวตาร์ สำหรับกรอบสูงสุดโดยเฉพาะ */
.royal-vip-tag{
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  z-index:6;
  font-size:9.5px;
  font-weight:800;
  letter-spacing:1px;
  padding:2px 10px;
  border-radius:20px;
  color:#2a1400;
  background:linear-gradient(90deg,#ffd873,#fff3d0,#ffd873,#b366ff,#ffd873);
  background-size:300% auto;
  animation:royalVipShine 3s linear infinite;
  box-shadow:0 0 10px rgba(255,215,115,.6);
  white-space:nowrap;
}
@keyframes royalVipShine{
  0%{ background-position:0% center; }
  100%{ background-position:300% center; }
}

@media (prefers-reduced-motion: reduce){
  .frame-royal::before, .frame-royal-innerring, .frame-royal-rays, .royal-sparkle, .frame-crown-icon, .royal-vip-tag{ animation:none; }
}

@media (prefers-reduced-motion: reduce){
  .avatar-frame-wrap::before, .avatar-frame-wrap::after, .badge-swatch-wrap::before, .lightning-bolt, .silver-particle, .frame-crown-icon{ animation:none; }
}
.name-line{
  font-size:18px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
}
.email-line{ font-size:12px; color:var(--muted); margin-top:4px; }

.change-avatar-btn{
  margin-top:14px;
  background:#10141c;
  border:1px solid var(--line);
  color:#fff;
  padding:9px 16px;
  border-radius:12px;
  font-size:12.5px;
  cursor:pointer;
  font-family:inherit;
}

.avatar-btn-row{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:14px;
}
.avatar-btn-row .change-avatar-btn{ margin-top:0; }
.upload-avatar-btn{
  background:linear-gradient(180deg,#ff8080,#b3121f);
  border:1px solid var(--line);
  color:#fff;
  padding:9px 16px;
  border-radius:12px;
  font-size:12.5px;
  cursor:pointer;
  font-family:inherit;
}
.upload-avatar-btn:disabled{ opacity:.6; cursor:default; }
.avatar-upload-msg{
  text-align:center;
  font-size:11.5px;
  min-height:16px;
  margin-top:8px;
}
.avatar-grid{
  display:none;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:16px;
}
.avatar-grid.show{ display:grid; }
.avatar-opt{
  aspect-ratio:1;
  border-radius:14px;
  background:#0d1119;
  border:2px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  cursor:pointer;
  transition:border-color .15s ease, transform .15s ease;
}
.avatar-opt:active{ transform:scale(.9); }
.avatar-opt.selected{ border-color:var(--red); box-shadow:0 0 10px rgba(255,77,77,.4); }

/* ===== Nickname section ===== */
.section-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
.section-title{ font-size:14px; font-weight:700; margin-bottom:10px; color:var(--red2); }
.nick-input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0a0e16;
  color:#fff;
  font-family:inherit;
  font-size:14px;
  outline:none;
  margin-bottom:10px;
}
.nick-input:focus{ border-color:var(--red); box-shadow:0 0 4px rgba(255,77,77,.25); }
.save-btn{
  width:100%;
  padding:12px;
  background:linear-gradient(180deg,#ff8080,#b3121f);
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  font-family:inherit;
}
.save-btn:active{ transform:scale(.98); }
.save-msg{ text-align:center; font-size:12px; min-height:16px; margin-top:8px; }

/* ===== Badge tiers ===== */
.topup-total{
  font-size:22px;
  font-weight:800;
  color:var(--gold);
  text-align:center;
  margin-bottom:4px;
}
.topup-sub{ text-align:center; font-size:11.5px; color:var(--muted); margin-bottom:16px; }

.badge-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.badge-item{
  background:#0d1119;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 4px;
  text-align:center;
}
.badge-item.unlocked{
  border-color:rgba(255,215,115,.5);
  box-shadow:0 0 10px rgba(255,215,115,.15);
}
.badge-item.frame-selected{
  border-color:var(--red) !important;
  box-shadow:0 0 14px rgba(255,77,77,.55) !important;
}
.badge-icon{ font-size:24px; display:block; }
.badge-item:not(.unlocked) .badge-icon{ filter:grayscale(1) opacity(.35); }
.badge-swatch-wrap{
  position:relative;
  width:30px; height:30px;
  margin:0 auto;
}
.badge-swatch-wrap::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:50%;
  z-index:1;
  animation:frameSpin 4s linear infinite;
}
.badge-swatch-wrap .badge-swatch{
  position:absolute;
  inset:5px;
  border-radius:50%;
  background:#0d1119;
  z-index:2;
}
.badge-item:not(.unlocked) .badge-swatch-wrap{ filter:grayscale(1) opacity(.35); }
.badge-need{ font-size:9.5px; color:var(--muted); margin-top:4px; line-height:1.3; }
.badge-item.unlocked .badge-need{ color:var(--green); }

.next-hint{
  margin-top:14px;
  font-size:12px;
  color:var(--muted);
  text-align:center;
  line-height:1.6;
}

.logout-btn{
  width:100%;
  padding:13px;
  background:transparent;
  border:1px solid #ff5a5a;
  color:#ff8080;
  border-radius:12px;
  font-weight:600;
  font-size:13.5px;
  cursor:pointer;
  font-family:inherit;
  margin-top:4px;
}
.logout-btn:active{ transform:scale(.98); }
</style>
</head>
<body>

<div class="topbar">
<a href="index.html" class="back-btn" onclick="if(window.history.length>1){event.preventDefault();history.back();}">‹</a>
<div class="topbar-title" style="display:flex;align-items:center;gap:8px;"><img src="logo.png" style="width:38px;height:38px;border-radius:8px;object-fit:contain;">👤 ໂປຣໄຟລ໌ຂອງຂ້ອຍ</div>
</div>

<div class="wrap" id="pageWrap">
<div class="center-msg">ກຳລັງໂຫລດ...</div>
</div>

<script src="supabase.js"></script>
<script>

// กรอบโปรไฟล์ เรียงจากสูงไปต่ำ ใช้หากรอบปัจจุบันแบบง่าย
const TIERS = [
  { key:"crown",   min:1000000, icon:"👑", frameClass:"frame-royal" },
  { key:"diamond", min:600000,  icon:"💎", frameClass:"frame-gray"  },
  { key:"gold",    min:300000,  icon:"🥇", frameClass:"frame-red"   },
  { key:"silver",  min:100000,  icon:"🥈", frameClass:"frame-blue"  },
  { key:"bronze",  min:20000,   icon:"🥉", frameClass:"frame-white" }
];

// เอฟเฟกพิเศษรอบกรอบโปรไฟล์ใหญ่ ตามระดับ (สายฟ้า / อนุภาคเงินลอย / มงกุฎ)
function buildFrameFx(frameClass){
  if(frameClass === "frame-red"){
    const positions = [
      "top:-6px;left:16px;transform:rotate(-15deg);",
      "top:26px;right:-10px;transform:rotate(20deg);",
      "bottom:-4px;left:24px;transform:rotate(160deg);",
      "bottom:22px;left:-10px;transform:rotate(200deg);"
    ];
    return positions.map(function(p, i){
      return '<span class="lightning-bolt" style="' + p + 'animation-delay:' + (i * 0.35) + 's;">⚡</span>';
    }).join("");
  }
  if(frameClass === "frame-gray"){
    const positions = [
      "top:10px;left:-4px;", "top:-4px;right:22px;", "bottom:8px;right:-4px;",
      "bottom:-4px;left:26px;", "top:38px;left:-6px;", "top:42px;right:-6px;"
    ];
    return positions.map(function(p, i){
      return '<span class="silver-particle" style="' + p + 'animation-delay:' + (i * 0.5) + 's;"></span>';
    }).join("");
  }
  if(frameClass === "frame-royal"){
    const sparklePositions = [
      "top:-8px;left:10px;",
      "top:14px;right:-10px;",
      "bottom:6px;right:-8px;",
      "bottom:-8px;left:20px;",
      "top:46px;left:-10px;",
      "top:50px;right:-6px;"
    ];
    const sparklesHtml = sparklePositions.map(function(p, i){
      const icon = i % 2 === 0 ? "✨" : "💎";
      return '<span class="royal-sparkle" style="' + p + 'animation-delay:' + (i * 0.35) + 's;">' + icon + '</span>';
    }).join("");
    return (
      '<div class="frame-royal-rays"></div>' +
      '<div class="frame-royal-innerring"></div>' +
      sparklesHtml +
      '<div class="frame-crown-icon">👑</div>' +
      '<div class="royal-vip-tag">VIP</div>'
    );
  }
  return "";
}

const AVATAR_OPTIONS = ["🙂","😎","🥷","🐱","🐶","🦊","🐼","🐸","👾","🤖","🎮","⚡","🔥","💀","👑","🍉"];

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getCurrentBadge(total){
  for(const t of TIERS){ if(total >= t.min) return t; }
  return null;
}
function getNextBadge(total){
  const sorted = TIERS.slice().reverse(); // ต่ำ -> สูง
  for(const t of sorted){ if(total < t.min) return t; }
  return null;
}

// บัญชีที่ avatar_all_frames = true (ตั้งจากฝั่ง Supabase) เลือกกรอบเองได้ทุกแบบ
// โดยไม่ผูกกับยอดเติมสะสมจริง
function getEffectiveBadge(total, selectedKey){
  if(profile && profile.avatar_all_frames){
    return TIERS.find(function(t){ return t.key === selectedKey; }) || TIERS[0];
  }
  return getCurrentBadge(total);
}

const AVATAR_BUCKET = "avatars"; // ต้องสร้าง Storage bucket ชื่อนี้ (public) ใน Supabase dashboard ก่อน
const AVATAR_MAX_BYTES = 3 * 1024 * 1024; // 3MB

let profile = null;
let currentUser = null;
let selectedAvatar = "🙂";
let selectedAvatarUrl = null;
let selectedFrameKey = null;

async function init(){
  const {data:{user}} = await supabaseClient.auth.getUser();
  if(!user){
    location.href = "index.html";
    return;
  }
  currentUser = user;

  const {data, error} = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if(error){
    document.getElementById("pageWrap").innerHTML =
      '<div class="center-msg">ໂຫລດບໍ່ສຳເລັດ: ' + escapeHtml(error.message) + '</div>';
    return;
  }

  profile = data || { user_id:user.id, nickname:"", avatar_emoji:"🙂", avatar_url:null, total_topup:0, avatar_all_frames:false, selected_frame_key:null };
  selectedAvatar = profile.avatar_emoji || "🙂";
  selectedAvatarUrl = profile.avatar_url || null;
  selectedFrameKey = profile.selected_frame_key || "crown";
  render();
}

function render(){
  const total = Number(profile.total_topup || 0);
  const allFrames = !!profile.avatar_all_frames;
  const current = getEffectiveBadge(total, selectedFrameKey);
  const next = getNextBadge(total);
  const nickname = profile.nickname || currentUser.email.split("@")[0];

  const avatarGridHtml = AVATAR_OPTIONS.map(function(a){
    const sel = a === selectedAvatar ? " selected" : "";
    return '<div class="avatar-opt' + sel + '" onclick="pickAvatar(\'' + a + '\')">' + a + '</div>';
  }).join("");

  const frameClass = current ? current.frameClass : "";
  const frameFxHtml = current ? buildFrameFx(current.frameClass) : "";

  const badgeRowHtml = TIERS.slice().reverse().map(function(t){
    const unlocked = allFrames ? true : total >= t.min;
    const isSelected = allFrames && current && current.key === t.key;
    const clickAttr = allFrames ? ' onclick="pickFrame(\'' + t.key + '\')" style="cursor:pointer"' : '';
    return (
      '<div class="badge-item' + (unlocked ? ' unlocked' : '') + (isSelected ? ' frame-selected' : '') + '"' + clickAttr + '>' +
        '<div class="badge-swatch-wrap ' + t.frameClass + '"><div class="badge-swatch"></div></div>' +
        '<div class="badge-need">' + t.min.toLocaleString("de-DE") + '</div>' +
      '</div>'
    );
  }).join("");

  const nextHint = allFrames
    ? '🌟 ບັນຊີພິເສດ: ກົດເລືອກກອບໂປຣໄຟລ໌ໄດ້ທຸກແບບຂ້າງເທິງ'
    : (next
      ? 'ອີກ ' + (next.min - total).toLocaleString("de-DE") + ' ກີບ ຈະໄດ້ຮັບກອບໂປຣໄຟລ໌ໃໝ່'
      : 'ທ່ານໄດ້ຮັບກອບໂປຣໄຟລ໌ສູງສຸດແລ້ວ! 👑');

  const avatarBigInner = selectedAvatarUrl
    ? '<img src="' + escapeHtml(selectedAvatarUrl) + '" alt="ຮູບໂປຣໄຟລ໌">'
    : selectedAvatar;

  document.getElementById("pageWrap").innerHTML =
    '<div class="profile-card">' +
      '<div class="avatar-frame-wrap ' + frameClass + '">' +
        frameFxHtml +
        '<div class="avatar-big">' + avatarBigInner + '</div>' +
      '</div>' +
      '<div class="name-line">' + escapeHtml(nickname) + '</div>' +
      '<div class="email-line">' + escapeHtml(currentUser.email) + '</div>' +
      '<div class="avatar-btn-row">' +
        '<button class="change-avatar-btn" onclick="toggleAvatarGrid()">🖼️ ເລືອກອະວາຕາ</button>' +
        '<button class="upload-avatar-btn" id="uploadAvatarBtn" onclick="document.getElementById(\'avatarFileInput\').click()">📷 ອັບໂຫລດຮູບຈິງ</button>' +
      '</div>' +
      '<input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarFile(event)">' +
      '<div class="avatar-upload-msg" id="avatarUploadMsg"></div>' +
      '<div class="avatar-grid" id="avatarGrid">' + avatarGridHtml + '</div>' +
    '</div>' +

    '<div class="section-card">' +
      '<div class="section-title">✏️ ຕັ້ງຊື່ເລັ່ນ</div>' +
      '<input class="nick-input" id="nickInput" maxlength="24" placeholder="ຊື່ເລັ່ນຂອງທ່ານ" value="' + escapeHtml(profile.nickname || "") + '">' +
      '<button class="save-btn" onclick="saveProfile()">💾 ບັນທຶກ</button>' +
      '<div class="save-msg" id="saveMsg"></div>' +
    '</div>' +

    '<div class="section-card">' +
      '<div class="section-title">🖼️ ' + (allFrames ? 'ກອບໂປຣໄຟລ໌ (ເລືອກໄດ້ທຸກແບບ)' : 'ກອບໂປຣໄຟລ໌ (ຕາມຍອດເຕີມສະສົມ)') + '</div>' +
      '<div class="topup-total num">' + total.toLocaleString("de-DE") + ' ກີບ</div>' +
      '<div class="topup-sub">ຍອດເຕີມເງິນສະສົມທັງໝົດ</div>' +
      '<div class="badge-row">' + badgeRowHtml + '</div>' +
      '<div class="next-hint">' + nextHint + '</div>' +
    '</div>' +

    '<button class="logout-btn" onclick="doLogout()">🚪 ອອກຈາກລະບົບ</button>';
}

function toggleAvatarGrid(){
  document.getElementById("avatarGrid").classList.toggle("show");
}

function pickAvatar(a){
  selectedAvatar = a;
  selectedAvatarUrl = null; // เลือก emoji แล้วเลิกใช้รูปจริงที่เคยอัปโหลด
  render();
  // เปิดกริดค้างไว้หลัง re-render เพื่อให้กดเลือกต่อได้สะดวก
  document.getElementById("avatarGrid").classList.add("show");
}

function pickFrame(key){
  if(!profile || !profile.avatar_all_frames) return; // เฉพาะบัญชีที่ปลดล็อกทุกกรอบเท่านั้น
  selectedFrameKey = key;
  render();
}

async function handleAvatarFile(event){
  const file = event.target.files && event.target.files[0];
  event.target.value = ""; // เคลียร์ input ไว้เผื่ออัปโหลดไฟล์เดิมซ้ำ
  if(!file) return;

  const msg = document.getElementById("avatarUploadMsg");
  const btn = document.getElementById("uploadAvatarBtn");

  if(!file.type.startsWith("image/")){
    msg.style.color = "#ff7a86";
    msg.innerText = "ກະລຸນາເລືອກໄຟລ໌ຮູບພາບ";
    return;
  }
  if(file.size > AVATAR_MAX_BYTES){
    msg.style.color = "#ff7a86";
    msg.innerText = "ຮູບໃຫຍ່ເກີນໄປ (ສູງສຸດ 3MB)";
    return;
  }

  btn.disabled = true;
  msg.style.color = "#999";
  msg.innerText = "ກຳລັງອັບໂຫລດ...";

  try{
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = currentUser.id + "/" + Date.now() + "." + ext;

    const { error: uploadError } = await supabaseClient
      .storage
      .from(AVATAR_BUCKET)
      .upload(path, file, { upsert:true, cacheControl:"3600" });

    if(uploadError) throw uploadError;

    const { data: urlData } = supabaseClient
      .storage
      .from(AVATAR_BUCKET)
      .getPublicUrl(path);

    selectedAvatarUrl = urlData.publicUrl + "?t=" + Date.now(); // กันแคชรูปเก่า
    msg.style.color = "#3ddc9a";
    msg.innerText = "✅ ອັບໂຫລດແລ້ວ ກົດ 💾 ບັນທຶກ ເພື່ອຢືນຢັນ";
    render();
  }catch(e){
    console.error("[handleAvatarFile] error:", e);
    msg.style.color = "#ff7a86";
    msg.innerText = "❌ ອັບໂຫລດບໍ່ສຳເລັດ: " + (e.message || "ไม่ทราบสาเหตุ");
  }finally{
    const stillThere = document.getElementById("uploadAvatarBtn");
    if(stillThere) stillThere.disabled = false;
  }
}

async function saveProfile(){
  const msg = document.getElementById("saveMsg");
  const nickname = document.getElementById("nickInput").value.trim();

  if(!nickname){
    msg.style.color = "#ff7a86";
    msg.innerText = "ກະລຸນາໃສ່ຊື່ເລັ່ນ";
    return;
  }

  msg.style.color = "#999";
  msg.innerText = "ກຳລັງບັນທຶກ...";

  const { error } = await supabaseClient
    .from("profiles")
    .upsert({
      user_id: currentUser.id,
      nickname: nickname,
      avatar_emoji: selectedAvatar,
      avatar_url: selectedAvatarUrl,
      selected_frame_key: profile.avatar_all_frames ? selectedFrameKey : null,
      updated_at: new Date().toISOString()
    });

  if(error){
    msg.style.color = "#ff7a86";
    msg.innerText = "❌ ບັນທຶກບໍ່ສຳເລັດ: " + error.message;
    return;
  }

  profile.nickname = nickname;
  profile.avatar_emoji = selectedAvatar;
  profile.avatar_url = selectedAvatarUrl;
  profile.selected_frame_key = profile.avatar_all_frames ? selectedFrameKey : null;
  msg.style.color = "#3ddc9a";
  msg.innerText = "✅ ບັນທຶກແລ້ວ";
  render();
  document.getElementById("saveMsg").innerText = "✅ ບັນທຶກແລ້ວ";
  document.getElementById("saveMsg").style.color = "#3ddc9a";
}

async function doLogout(){
  await supabaseClient.auth.signOut();
  location.href = "index.html";
}

init();

</script>
</body>
</html>
