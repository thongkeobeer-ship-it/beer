<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ - 𝐃𝐄𝐊 𝐌𝐀𝐒𝐇 𝐒𝐇𝐎𝐏</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }

:root{
  --bg:#0a0e16;
  --card:#12161f;
  --line:#1c2733;
  --red:#ff4d4d;
  --red2:#ff8080;
  --green:#3ddc9a;
  --muted:#9db4c7;
  --gold:#ffd873;
}
.num{ font-family:'Orbitron',sans-serif; }

body{
  background-image: radial-gradient(circle at 15% 0%, rgba(255,77,77,.07), transparent 40%);
  background-color:var(--bg);
  background-repeat:no-repeat;
  background-size:220% 220%;
  animation:bgGlowDrift 18s ease-in-out infinite;
  color:#fff;
  padding-bottom:50px;
}
@keyframes bgGlowDrift{
  0%,100%{ background-position:0% 0%; }
  50%{ background-position:24% 18%; }
}
@media (prefers-reduced-motion: reduce){ body{ animation:none; } }

.topbar{
  display:flex; align-items:center; gap:12px;
  padding:16px; position:sticky; top:0;
  background:rgba(10,14,22,.85);
  backdrop-filter:blur(14px);
  z-index:50;
  border-bottom:1px solid var(--line);
}
.back-btn{
  width:38px; height:38px; border-radius:50%;
  background:var(--card); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; font-size:18px; flex-shrink:0;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.back-btn:active{ transform:scale(.9); }
.topbar-title{ font-weight:700; font-size:16px; }

.wrap{ max-width:480px; margin:0 auto; padding:16px; }

.center-msg{ text-align:center; color:var(--muted); padding:60px 20px; font-size:13.5px; }

/* ===== Avatar + nickname card ===== */
.profile-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:26px 18px;
  text-align:center;
  margin-bottom:16px;
}
.avatar-big{
  width:96px; height:96px;
  border-radius:50%;
  background:linear-gradient(160deg,#1a0d05,#12161f);
  border:2px solid var(--red);
  box-shadow:0 0 22px rgba(255,77,77,.35);
  display:flex; align-items:center; justify-content:center;
  font-size:46px;
  margin:0 auto 12px;
}
.avatar-big img{
  width:100%; height:100%;
  object-fit:cover;
  border-radius:50%;
  display:block;
}

/* ===== กรอบโปรไฟล์ตามยอดเติม (แทนเหรียญยศ) ===== */
.avatar-frame-wrap{
  position:relative;
  width:122px; height:122px;
  margin:0 auto 22px;
  display:flex; align-items:center; justify-content:center;
}
.avatar-frame-wrap .avatar-big{
  margin:0;
  position:relative;
  z-index:3;
  border-color:transparent;
  overflow:hidden;
}
/* ประกายเงาวิ่งผ่านตัวอวตาร์ ให้ดูมันวาวคล้ายเหรียญขัดเงา */
.avatar-frame-wrap .avatar-big::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 32%, rgba(255,255,255,.32) 48%, transparent 64%);
  background-size:220% 220%;
  animation:avatarShine 3.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes avatarShine{
  0%{ background-position:130% 130%; }
  50%{ background-position:10% 10%; }
  100%{ background-position:130% 130%; }
}
/* แสงเรืองฟุ้งด้านหลัง หายใจเข้าออกเบาๆ */
.avatar-frame-wrap::after{
  content:"";
  position:absolute;
  inset:-16px;
  border-radius:50%;
  z-index:0;
  filter:blur(11px);
  animation:frameGlowPulse 2.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes frameGlowPulse{
  0%,100%{ opacity:.4; transform:scale(.95); }
  50%{ opacity:.8; transform:scale(1.06); }
}
/* วงแหวนหมุน — มีแถบสว่าง 2 จุดให้ดูเหมือนโลหะขัดมัน */
.avatar-frame-wrap::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  z-index:1;
  animation:frameSpin 5s linear infinite;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
}
@keyframes frameSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce){
  .avatar-frame-wrap .avatar-big::after{ animation:none; }
}

/* 20.000 กีบ — ขาวมุก */
.frame-white::before{
  background:conic-gradient(from 0deg,
    #8b95a1 0%, #ffffff 12%, #ffffff 20%, #8b95a1 35%,
    #565e68 50%, #ffffff 65%, #ffffff 73%, #8b95a1 88%, #8b95a1 100%);
}
.frame-white::after{ background:radial-gradient(circle, rgba(255,255,255,.55), transparent 70%); }
.frame-white .avatar-big{ box-shadow:0 0 18px rgba(255,255,255,.55); }

/* 100.000 กีบ — ฟ้าน้ำแข็ง */
.frame-blue::before{
  background:conic-gradient(from 0deg,
    #0d5a8c 0%, #7fe0ff 12%, #eaffff 20%, #4dc3ff 35%,
    #0d5a8c 50%, #7fe0ff 65%, #eaffff 73%, #1a7fc4 88%, #0d5a8c 100%);
  animation-duration:5.5s;
}
.frame-blue::after{ background:radial-gradient(circle, rgba(77,195,255,.55), transparent 70%); }
.frame-blue .avatar-big{ box-shadow:0 0 20px rgba(77,195,255,.6); }

/* 100.000 กีบ — เกล็ดน้ำแข็งลอยฟุ้งรอบกรอบ */
.ice-crystal{
  position:absolute;
  width:13px; height:13px;
  z-index:4;
  opacity:0;
  animation:iceCrystalFloat 2.8s ease-in-out infinite;
  filter:drop-shadow(0 0 5px #7fe0ff) drop-shadow(0 0 3px #fff);
  background:linear-gradient(180deg,#ffffff,#7fe0ff);
  clip-path:polygon(50% 0%, 61% 38%, 98% 38%, 68% 60%, 79% 95%, 50% 74%, 21% 95%, 32% 60%, 2% 38%, 39% 38%);
}
@keyframes iceCrystalFloat{
  0%{ opacity:0; transform:translateY(0) rotate(0deg) scale(.6); }
  20%{ opacity:1; }
  55%{ opacity:.9; transform:translateY(-14px) rotate(180deg) scale(1); }
  85%{ opacity:.25; }
  100%{ opacity:0; transform:translateY(-20px) rotate(220deg) scale(.6); }
}
.frame-blue .avatar-big::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.25), transparent 55%);
  animation:frostShimmer 2.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes frostShimmer{
  0%,100%{ opacity:.4; }
  50%{ opacity:.9; }
}

/* 300.000 กีบ — แดง + สายฟ้า */
.frame-red::before{
  background:conic-gradient(from 0deg,
    #6b0d14 0%, #ff8080 12%, #fff0f0 20%, #ff4d4d 35%,
    #6b0d14 50%, #ff8080 65%, #fff0f0 73%, #b3121f 88%, #6b0d14 100%);
  animation-duration:4.2s;
}
.frame-red::after{ background:radial-gradient(circle, rgba(255,77,77,.6), transparent 70%); }
.frame-red .avatar-big{ box-shadow:0 0 22px rgba(255,77,77,.65); }
.lightning-bolt{
  position:absolute;
  width:13px; height:20px;
  z-index:4;
  opacity:0;
  animation:boltFlicker 1.8s ease-in-out infinite;
  filter:drop-shadow(0 0 6px #ff4d4d) drop-shadow(0 0 3px #fff);
  background:linear-gradient(180deg,#fff3d0,#ff8080 45%,#ff4d4d);
  clip-path:polygon(58% 0%, 0% 58%, 42% 58%, 34% 100%, 100% 40%, 52% 40%);
}
@keyframes boltFlicker{
  0%,100%{ opacity:0; }
  8%,18%{ opacity:1; }
  26%{ opacity:0; }
  55%,68%{ opacity:1; }
  78%{ opacity:0; }
}

/* 600.000 กีบ — เพชรฟ้าอมเขียว (diamond) + อนุภาคลอยประกายเพชร — แยกจากสีขาว 20.000 อย่างชัดเจน */
.frame-gray::before{
  background:conic-gradient(from 0deg,
    #0a3d40 0%, #7ffff5 12%, #eafffc 20%, #2dd4c8 35%,
    #0a3d40 50%, #7ffff5 65%, #eafffc 73%, #145e59 88%, #0a3d40 100%);
  animation-duration:6s;
}
.frame-gray::after{ background:radial-gradient(circle, rgba(45,212,200,.6), transparent 70%); }
.frame-gray .avatar-big{ box-shadow:0 0 22px rgba(45,212,200,.6), 0 0 34px rgba(127,255,245,.3); }
.silver-particle{
  position:absolute;
  width:5px; height:5px;
  border-radius:50%;
  background:#eafffc;
  box-shadow:0 0 7px #7ffff5, 0 0 3px #fff;
  z-index:4;
  opacity:0;
  animation:particleFloat 3.2s ease-in infinite;
}
@keyframes particleFloat{
  0%{ transform:translateY(0) scale(1); opacity:0; }
  15%{ opacity:1; }
  100%{ transform:translateY(-42px) scale(.25); opacity:0; }
}
.diamond-sparkle{
  position:absolute;
  width:11px; height:11px;
  z-index:5;
  opacity:0;
  animation:diamondSparkleTwinkle 2.4s ease-in-out infinite;
  filter:drop-shadow(0 0 5px #2dd4c8) drop-shadow(0 0 6px #eafffc);
  background:linear-gradient(180deg,#eafffc,#2dd4c8);
}
.diamond-sparkle.shape-gem{ clip-path:polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%); }
.diamond-sparkle.shape-star{ clip-path:polygon(50% 0%, 61% 38%, 98% 38%, 68% 60%, 79% 95%, 50% 74%, 21% 95%, 32% 60%, 2% 38%, 39% 38%); }
@keyframes diamondSparkleTwinkle{
  0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
  45%{ opacity:1; transform:scale(1.1) rotate(160deg); }
  60%{ opacity:.6; transform:scale(.85) rotate(200deg); }
}

/* 1.000.000 กีบ — ม่วง+ทอง + มงกุฎขยับขึ้นลง + เอฟเฟกต์พรีเมียมเต็มขั้น */
.frame-royal::before{
  background:conic-gradient(from 0deg,
    #4a1a80 0%, #ffd873 10%, #fff3d0 16%, #b366ff 30%,
    #4a1a80 45%, #ffd873 60%, #fff3d0 66%, #6a1fd0 80%, #4a1a80 100%);
  animation:frameSpin 3.8s linear infinite, royalHueShift 6s linear infinite;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15), 0 0 10px rgba(255,215,115,.4);
}
@keyframes royalHueShift{
  0%{ filter:hue-rotate(0deg) saturate(1); }
  50%{ filter:hue-rotate(35deg) saturate(1.3); }
  100%{ filter:hue-rotate(0deg) saturate(1); }
}
.frame-royal::after{
  background:radial-gradient(circle, rgba(179,102,255,.6) 0%, rgba(255,215,115,.45) 55%, transparent 78%);
  animation:frameGlowPulse 1.8s ease-in-out infinite;
}
.frame-royal .avatar-big{
  box-shadow:
    0 0 22px rgba(179,102,255,.65),
    0 0 34px rgba(255,215,115,.5),
    0 0 46px rgba(179,102,255,.3);
}

/* วงแหวนบางซ้อนชั้นใน หมุนสวนทาง ให้ดูมีมิติแบบเหรียญรางวัลระดับสูง */
.frame-royal-innerring{
  position:absolute;
  inset:9px;
  border-radius:50%;
  z-index:2;
  padding:2px;
  background:conic-gradient(from 180deg, #ffd873, transparent 25%, #b366ff, transparent 55%, #ffd873, transparent 85%, #b366ff);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  animation:frameSpin 2.6s linear infinite reverse;
  pointer-events:none;
  opacity:.85;
}

/* รังสีแสงพุ่งออกจากศูนย์กลาง หมุนช้าๆ อยู่ชั้นหลังสุด ให้ดูเหมือนออร่าเปล่งประกาย */
.frame-royal-rays{
  position:absolute;
  inset:-34px;
  z-index:0;
  border-radius:50%;
  pointer-events:none;
  background:conic-gradient(from 0deg,
    transparent 0deg, rgba(255,215,115,.4) 4deg, transparent 10deg,
    transparent 34deg, rgba(179,102,255,.35) 38deg, transparent 44deg,
    transparent 68deg, rgba(255,215,115,.4) 72deg, transparent 78deg,
    transparent 102deg, rgba(179,102,255,.35) 106deg, transparent 112deg,
    transparent 136deg, rgba(255,215,115,.4) 140deg, transparent 146deg,
    transparent 170deg, rgba(179,102,255,.35) 174deg, transparent 180deg,
    transparent 204deg, rgba(255,215,115,.4) 208deg, transparent 214deg,
    transparent 238deg, rgba(179,102,255,.35) 242deg, transparent 248deg,
    transparent 272deg, rgba(255,215,115,.4) 276deg, transparent 282deg,
    transparent 306deg, rgba(179,102,255,.35) 310deg, transparent 316deg,
    transparent 340deg, rgba(255,215,115,.4) 344deg, transparent 350deg);
  animation:royalRaysSpin 9s linear infinite;
  mix-blend-mode:screen;
}
@keyframes royalRaysSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

/* ประกายดาวกระพริบรอบกรอบ */
.royal-sparkle{
  position:absolute;
  width:12px; height:12px;
  z-index:5;
  opacity:0;
  animation:royalSparkleTwinkle 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 5px #ffd873) drop-shadow(0 0 7px #b366ff);
  background:linear-gradient(180deg,#ffd873,#b366ff);
}
.royal-sparkle.shape-gem{ clip-path:polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%); }
.royal-sparkle.shape-star{ clip-path:polygon(50% 0%, 61% 38%, 98% 38%, 68% 60%, 79% 95%, 50% 74%, 21% 95%, 32% 60%, 2% 38%, 39% 38%); }
@keyframes royalSparkleTwinkle{
  0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
  45%{ opacity:1; transform:scale(1.15) rotate(180deg); }
  60%{ opacity:.7; transform:scale(.9) rotate(220deg); }
}

.frame-crown-icon{
  position:absolute;
  top:-24px;
  left:50%;
  width:34px; height:22px;
  transform:translateX(-50%);
  z-index:6;
  background:linear-gradient(180deg,#ffd873,#fff3d0 45%,#b366ff);
  clip-path:polygon(0% 100%, 0% 42%, 20% 62%, 35% 18%, 50% 55%, 65% 18%, 80% 62%, 100% 42%, 100% 100%);
  animation:crownBob 2s ease-in-out infinite, crownGlowPulse 1.6s ease-in-out infinite;
}
@keyframes crownBob{
  0%,100%{ transform:translateX(-50%) translateY(0) rotate(-5deg); }
  50%{ transform:translateX(-50%) translateY(-6px) rotate(5deg); }
}
@keyframes crownGlowPulse{
  0%,100%{ filter:drop-shadow(0 0 7px rgba(255,215,115,.75)) drop-shadow(0 0 3px rgba(179,102,255,.6)); }
  50%{ filter:drop-shadow(0 0 13px rgba(255,215,115,1)) drop-shadow(0 0 8px rgba(179,102,255,.9)); }
}

/* ป้าย VIP ใต้อวตาร์ สำหรับกรอบสูงสุดโดยเฉพาะ */
.royal-vip-tag{
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  z-index:6;
  font-size:9.5px;
  font-weight:800;
  letter-spacing:1px;
  padding:2px 10px;
  border-radius:20px;
  color:#2a1400;
  background:linear-gradient(90deg,#ffd873,#fff3d0,#ffd873,#b366ff,#ffd873);
  background-size:300% auto;
  animation:royalVipShine 3s linear infinite;
  box-shadow:0 0 10px rgba(255,215,115,.6);
  white-space:nowrap;
}
@keyframes royalVipShine{
  0%{ background-position:0% center; }
  100%{ background-position:300% center; }
}

@media (prefers-reduced-motion: reduce){
  .frame-royal::before, .frame-royal-innerring, .frame-royal-rays, .royal-sparkle, .frame-crown-icon, .royal-vip-tag{ animation:none; }
}

/* ============================================================
   3.000.000 กีบ — LEGENDARY (เหนือ VIP) — รวม 4 ธีม:
   จักรวาล + ดำทองหรู + มังกรไฟ + นีออนไซเบอร์พังก์ ในกรอบเดียว
   ============================================================ */
.frame-legend::before{
  background:conic-gradient(from 0deg,
    #050505 0%, #ffd873 8%, #050505 16%, #ff2e6d 24%,
    #050505 32%, #ffd873 40%, #050505 48%, #4dd8ff 56%,
    #050505 64%, #ffd873 72%, #050505 80%, #b366ff 88%, #050505 100%);
  animation:frameSpin 4.5s linear infinite, legendHueShift 8s ease-in-out infinite;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), 0 0 14px rgba(255,215,115,.5);
}
@keyframes legendHueShift{
  0%{ filter:hue-rotate(0deg) saturate(1.1); }
  33%{ filter:hue-rotate(35deg) saturate(1.4); }
  66%{ filter:hue-rotate(-30deg) saturate(1.3); }
  100%{ filter:hue-rotate(0deg) saturate(1.1); }
}
.frame-legend::after{
  background:radial-gradient(circle, rgba(255,46,109,.5) 0%, rgba(77,216,255,.4) 45%, rgba(179,102,255,.35) 70%, transparent 85%);
  animation:frameGlowPulse 2.2s ease-in-out infinite;
}
.frame-legend .avatar-big{
  box-shadow:
    0 0 22px rgba(255,215,115,.6),
    0 0 30px rgba(255,46,109,.45),
    0 0 40px rgba(77,216,255,.35),
    0 0 50px rgba(179,102,255,.25);
}

/* ชั้นจักรวาล/เนบิวลาฟุ้งอยู่นอกสุด (เบลอ ให้ความลึก) */
.frame-legend-galaxy{
  position:absolute;
  inset:-32px;
  z-index:0;
  border-radius:50%;
  pointer-events:none;
  background:
    radial-gradient(circle at 25% 30%, rgba(179,102,255,.35), transparent 45%),
    radial-gradient(circle at 75% 65%, rgba(77,140,255,.3), transparent 50%),
    radial-gradient(circle at 50% 88%, rgba(255,46,109,.22), transparent 45%);
  filter:blur(7px);
  animation:legendGalaxyDrift 10s ease-in-out infinite;
}
@keyframes legendGalaxyDrift{
  0%,100%{ transform:rotate(0deg) scale(1); }
  50%{ transform:rotate(14deg) scale(1.08); }
}

/* ดาวกระพริบเล็กๆ ลอยอยู่ในชั้นจักรวาล */
.legend-star{
  position:absolute;
  width:4px; height:4px;
  border-radius:50%;
  background:#fff;
  z-index:0;
  opacity:0;
  box-shadow:0 0 4px #fff, 0 0 8px #b366ff;
  animation:legendStarTwinkle 2.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes legendStarTwinkle{
  0%,100%{ opacity:0; transform:scale(.5); }
  50%{ opacity:1; transform:scale(1.3); }
}

/* วงแหวนในหมุนสวนทาง ลายดำ-ทองหรู ให้มิติแบบเหรียญรางวัล */
.frame-legend-innerring{
  position:absolute;
  inset:8px;
  border-radius:50%;
  z-index:2;
  padding:2px;
  background:conic-gradient(from 90deg, #ffd873, #050505 20%, #ffd873 40%, #050505 60%, #ffd873 80%, #050505 100%);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  animation:frameSpin 3.2s linear infinite reverse;
  pointer-events:none;
  opacity:.9;
}

/* เปลวไฟมังกรลอยขึ้นรอบกรอบ (แทนที่สายฟ้า ใช้สีแดง-ทอง) */
.dragon-flame{
  position:absolute;
  width:12px; height:18px;
  z-index:4;
  opacity:0;
  animation:dragonFlameRise 2s ease-in-out infinite;
  filter:drop-shadow(0 0 6px #ff2e6d) drop-shadow(0 0 4px #ffd873);
  background:linear-gradient(180deg,#ffd873,#ff8080 45%,#ff2e6d);
  clip-path:polygon(50% 0%, 75% 32%, 64% 32%, 86% 62%, 55% 58%, 60% 100%, 30% 68%, 40% 54%, 15% 48%, 36% 28%);
}
@keyframes dragonFlameRise{
  0%{ opacity:0; transform:translateY(0) scale(.6) rotate(-4deg); }
  25%{ opacity:1; }
  55%{ opacity:.9; transform:translateY(-12px) scale(1) rotate(4deg); }
  85%{ opacity:.2; }
  100%{ opacity:0; transform:translateY(-18px) scale(.6) rotate(-4deg); }
}

/* ประกายนีออนไซเบอร์พังก์ ฟ้า-ชมพู-ม่วง กระพริบสลับ */
.legend-neon-spark{
  position:absolute;
  width:10px; height:10px;
  z-index:5;
  opacity:0;
  animation:legendNeonTwinkle 2.4s ease-in-out infinite;
  pointer-events:none;
}
.legend-neon-spark.shape-gem{
  clip-path:polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%);
  filter:drop-shadow(0 0 5px #4dd8ff) drop-shadow(0 0 6px #ff2e6d);
  background:linear-gradient(180deg,#4dd8ff,#ff2e6d);
}
.legend-neon-spark.shape-star{
  clip-path:polygon(50% 0%, 61% 38%, 98% 38%, 68% 60%, 79% 95%, 50% 74%, 21% 95%, 32% 60%, 2% 38%, 39% 38%);
  filter:drop-shadow(0 0 5px #b366ff) drop-shadow(0 0 6px #4dd8ff);
  background:linear-gradient(180deg,#b366ff,#4dd8ff);
}
@keyframes legendNeonTwinkle{
  0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
  45%{ opacity:1; transform:scale(1.15) rotate(-160deg); }
  60%{ opacity:.6; transform:scale(.85) rotate(-200deg); }
}

/* มงกุฎมังกรวาดด้วย CSS ล้วน (ไม่ใช้อิโมจิ) ลอยขึ้น-ลงเหนืออวตาร์ */
.frame-legend-icon{
  position:absolute;
  top:-30px;
  left:50%;
  width:34px; height:28px;
  transform:translateX(-50%);
  z-index:6;
  background:linear-gradient(160deg,#ffd873,#ff2e6d 45%,#8b3dff 85%);
  clip-path:polygon(50% 100%, 32% 82%, 16% 58%, 10% 30%, 24% 8%, 36% 24%, 50% 0%, 64% 24%, 76% 8%, 90% 30%, 84% 58%, 68% 82%);
  animation:crownBob 2s ease-in-out infinite, legendIconGlow 1.6s ease-in-out infinite;
}
/* ดวงตาไฟเล็กๆ กลางไอคอน ให้ดูมีชีวิตแบบมังกร */
.frame-legend-icon::after{
  content:"";
  position:absolute;
  top:40%; left:50%;
  width:4px; height:4px;
  border-radius:50%;
  background:#fff3d0;
  box-shadow:0 0 4px #fff, 0 0 6px #ff2e6d;
  transform:translate(-50%,-50%);
}
@keyframes legendIconGlow{
  0%,100%{ filter:drop-shadow(0 0 7px rgba(255,46,109,.75)) drop-shadow(0 0 5px rgba(77,216,255,.6)); }
  50%{ filter:drop-shadow(0 0 14px rgba(255,46,109,1)) drop-shadow(0 0 10px rgba(77,216,255,.9)); }
}

/* ป้าย LEGEND ใต้อวตาร์ ไล่สีทอง→ชมพู→ฟ้า→ม่วง */
.legend-tag{
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  z-index:6;
  font-size:9.5px;
  font-weight:800;
  letter-spacing:1px;
  padding:2px 10px;
  border-radius:20px;
  color:#fff;
  background:linear-gradient(90deg,#ffd873,#ff2e6d,#4dd8ff,#b366ff,#ffd873);
  background-size:300% auto;
  animation:royalVipShine 3s linear infinite;
  box-shadow:0 0 12px rgba(255,46,109,.6);
  white-space:nowrap;
}

@media (prefers-reduced-motion: reduce){
  .frame-legend::before, .frame-legend-innerring, .frame-legend-galaxy, .legend-star,
  .dragon-flame, .legend-neon-spark, .frame-legend-icon, .legend-tag{ animation:none; }
}

@media (prefers-reduced-motion: reduce){
  .avatar-frame-wrap::before, .avatar-frame-wrap::after, .badge-swatch-wrap::before, .lightning-bolt, .silver-particle, .diamond-sparkle, .ice-crystal, .frame-blue .avatar-big::before, .frame-crown-icon{ animation:none; }
}

<body>

<div class="topbar">
<a href="index.html" class="back-btn" onclick="if(window.history.length>1){event.preventDefault();history.back();}">‹</a>
<div class="topbar-title" style="display:flex;align-items:center;gap:8px;"><img src="logo.png" style="width:38px;height:38px;border-radius:8px;object-fit:contain;">👤 ໂປຣໄຟລ໌ຂອງຂ້ອຍ</div>
</div>

<div class="wrap" id="pageWrap">
<div class="center-msg">ກຳລັງໂຫລດ...</div>
</div>

<script src="supabase.js"></script>
<script>

// กรอบโปรไฟล์ เรียงจากสูงไปต่ำ ใช้หากรอบปัจจุบันแบบง่าย
const TIERS = [
  { key:"legend",  min:3000000, icon:"",  frameClass:"frame-legend" },
  { key:"crown",   min:1000000, icon:"",  frameClass:"frame-royal" },
  { key:"diamond", min:600000,  icon:"",  frameClass:"frame-gray"  },
  { key:"gold",    min:300000,  icon:"",  frameClass:"frame-red"   },
  { key:"silver",  min:100000,  icon:"",  frameClass:"frame-blue"  },
  { key:"bronze",  min:20000,   icon:"",  frameClass:"frame-white" }
];

// เอฟเฟกพิเศษรอบกรอบโปรไฟล์ใหญ่ ตามระดับ (สายฟ้า / อนุภาคเงินลอย / มงกุฎ)
// เอฟเฟกต์เพิ่มเติมรอบวงกลมเล็ก (badge-swatch) เฉพาะ 4 ระดับบน — ใช้ทรง CSS เดิมแค่ย่อขนาด ไม่มีอิโมจิ
function buildBadgeFx(frameClass){
  if(frameClass === "frame-red"){
    return (
      '<span class="lightning-bolt" style="top:-3px;left:8px;width:7px;height:11px;transform:rotate(-15deg);animation-delay:0s;"></span>' +
      '<span class="lightning-bolt" style="bottom:-3px;right:1px;width:7px;height:11px;transform:rotate(160deg);animation-delay:.3s;"></span>'
    );
  }
  if(frameClass === "frame-gray"){
    return (
      '<span class="silver-particle" style="top:1px;left:-3px;width:3px;height:3px;animation-delay:0s;"></span>' +
      '<span class="silver-particle" style="bottom:-3px;right:3px;width:3px;height:3px;animation-delay:.4s;"></span>' +
      '<span class="diamond-sparkle shape-gem" style="top:-4px;right:2px;width:6px;height:6px;animation-delay:.2s;"></span>'
    );
  }
  if(frameClass === "frame-royal"){
    return (
      '<span class="royal-sparkle shape-star" style="top:-4px;left:-3px;width:6px;height:6px;animation-delay:0s;"></span>' +
      '<span class="royal-sparkle shape-gem" style="bottom:-4px;right:-3px;width:6px;height:6px;animation-delay:.3s;"></span>'
    );
  }
  if(frameClass === "frame-legend"){
    return (
      '<span class="dragon-flame" style="top:-4px;left:5px;width:6px;height:9px;transform:rotate(-10deg);animation-delay:0s;"></span>' +
      '<span class="legend-neon-spark shape-gem" style="bottom:-4px;right:-3px;width:6px;height:6px;animation-delay:.2s;"></span>' +
      '<span class="legend-neon-spark shape-star" style="top:1px;right:-4px;width:5px;height:5px;animation-delay:.4s;"></span>'
    );
  }
  return "";
}

function buildFrameFx(frameClass){
  if(frameClass === "frame-red"){
    const positions = [
      "top:-6px;left:16px;transform:rotate(-15deg);",
      "top:26px;right:-10px;transform:rotate(20deg);",
      "bottom:-4px;left:24px;transform:rotate(160deg);",
      "bottom:22px;left:-10px;transform:rotate(200deg);"
    ];
    return positions.map(function(p, i){
      return '<span class="lightning-bolt" style="' + p + 'animation-delay:' + (i * 0.35) + 's;"></span>';
    }).join("");
  }
  if(frameClass === "frame-gray"){
    const positions = [
      "top:10px;left:-4px;", "top:-4px;right:22px;", "bottom:8px;right:-4px;",
      "bottom:-4px;left:26px;", "top:38px;left:-6px;", "top:42px;right:-6px;"
    ];
    const particlesHtml = positions.map(function(p, i){
      return '<span class="silver-particle" style="' + p + 'animation-delay:' + (i * 0.5) + 's;"></span>';
    }).join("");
    const sparklePositions = [
      "top:-8px;left:14px;", "top:20px;right:-8px;", "bottom:2px;left:-8px;", "bottom:-6px;right:18px;"
    ];
    const sparklesHtml = sparklePositions.map(function(p, i){
      const shape = i % 2 === 0 ? "shape-gem" : "shape-star";
      return '<span class="diamond-sparkle ' + shape + '" style="' + p + 'animation-delay:' + (i * 0.4) + 's;"></span>';
    }).join("");
    return particlesHtml + sparklesHtml;
  }
  if(frameClass === "frame-blue"){
    const positions = [
      "top:-6px;left:18px;", "top:24px;right:-8px;", "bottom:6px;right:-6px;",
      "bottom:-6px;left:22px;", "top:44px;left:-8px;"
    ];
    return positions.map(function(p, i){
      return '<span class="ice-crystal" style="' + p + 'animation-delay:' + (i * 0.45) + 's;"></span>';
    }).join("");
  }
  if(frameClass === "frame-legend"){
    const starPositions = [
      "top:-22px;left:8px;", "top:-10px;right:2px;", "bottom:-18px;left:4px;",
      "bottom:-24px;right:12px;", "top:48%;left:-26px;", "top:38%;right:-28px;"
    ];
    const starsHtml = starPositions.map(function(p, i){
      return '<span class="legend-star" style="' + p + 'animation-delay:' + (i * 0.4) + 's;"></span>';
    }).join("");

    const flamePositions = [
      "top:-6px;left:14px;transform:rotate(-8deg);",
      "top:30px;right:-10px;transform:rotate(10deg);",
      "bottom:-4px;left:20px;transform:rotate(170deg);",
      "bottom:26px;left:-10px;transform:rotate(-170deg);"
    ];
    const flamesHtml = flamePositions.map(function(p, i){
      return '<span class="dragon-flame" style="' + p + 'animation-delay:' + (i * 0.4) + 's;"></span>';
    }).join("");

    const neonPositions = [
      "top:-10px;left:42px;", "top:34px;right:-12px;", "bottom:0px;right:-8px;", "bottom:-10px;left:44px;"
    ];
    const neonHtml = neonPositions.map(function(p, i){
      const shape = i % 2 === 0 ? "shape-gem" : "shape-star";
      return '<span class="legend-neon-spark ' + shape + '" style="' + p + 'animation-delay:' + (i * 0.5) + 's;"></span>';
    }).join("");

    return (
      '<div class="frame-legend-galaxy"></div>' +
      starsHtml +
      '<div class="frame-legend-innerring"></div>' +
      flamesHtml +
      neonHtml +
      '<div class="frame-legend-icon"></div>' +
      '<div class="legend-tag">LEGEND</div>'
    );
  }
  if(frameClass === "frame-royal"){
    const sparklePositions = [
      "top:-8px;left:10px;",
      "top:14px;right:-10px;",
      "bottom:6px;right:-8px;",
      "bottom:-8px;left:20px;",
      "top:46px;left:-10px;",
      "top:50px;right:-6px;"
    ];
    const sparklesHtml = sparklePositions.map(function(p, i){
      const shape = i % 2 === 0 ? "shape-star" : "shape-gem";
      return '<span class="royal-sparkle ' + shape + '" style="' + p + 'animation-delay:' + (i * 0.35) + 's;"></span>';
    }).join("");
    return (
      '<div class="frame-royal-rays"></div>' +
      '<div class="frame-royal-innerring"></div>' +
      sparklesHtml +
      '<div class="frame-crown-icon"></div>' +
      '<div class="royal-vip-tag">VIP</div>'
    );
  }
  return "";
}

const AVATAR_OPTIONS = ["🙂","😎","🥷","🐱","🐶","🦊","🐼","🐸","👾","🤖","🎮","⚡","🔥","💀","👑","🍉"];

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getCurrentBadge(total){
  for(const t of TIERS){ if(total >= t.min) return t; }
  return null;
}
function getNextBadge(total){
  const sorted = TIERS.slice().reverse(); // ต่ำ -> สูง
  for(const t of sorted){ if(total < t.min) return t; }
  return null;
}

// บัญชีที่ avatar_all_frames = true (ตั้งจากฝั่ง Supabase) เลือกกรอบเองได้ทุกแบบ
// โดยไม่ผูกกับยอดเติมสะสมจริง
function getEffectiveBadge(total, selectedKey){
  if(profile && profile.avatar_all_frames){
    return TIERS.find(function(t){ return t.key === selectedKey; }) || TIERS[0];
  }
  return getCurrentBadge(total);
}

const AVATAR_BUCKET = "avatars"; // ต้องสร้าง Storage bucket ชื่อนี้ (public) ใน Supabase dashboard ก่อน
const AVATAR_MAX_BYTES = 3 * 1024 * 1024; // 3MB

let profile = null;
let currentUser = null;
let selectedAvatar = "🙂";
let selectedAvatarUrl = null;
let selectedFrameKey = null;

async function init(){
  const {data:{user}} = await supabaseClient.auth.getUser();
  if(!user){
    location.href = "index.html";
    return;
  }
  currentUser = user;

  const {data, error} = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if(error){
    document.getElementById("pageWrap").innerHTML =
      '<div class="center-msg">ໂຫລດບໍ່ສຳເລັດ: ' + escapeHtml(error.message) + '</div>';
    return;
  }

  profile = data || { user_id:user.id, nickname:"", avatar_emoji:"🙂", avatar_url:null, total_topup:0, avatar_all_frames:false, selected_frame_key:null };
  selectedAvatar = profile.avatar_emoji || "🙂";
  selectedAvatarUrl = profile.avatar_url || null;
  selectedFrameKey = profile.selected_frame_key || "crown";
  render();
}

function render(){
  const total = Number(profile.total_topup || 0);
  const allFrames = !!profile.avatar_all_frames;
  const current = getEffectiveBadge(total, selectedFrameKey);
  const next = getNextBadge(total);
  const nickname = profile.nickname || currentUser.email.split("@")[0];

  const avatarGridHtml = AVATAR_OPTIONS.map(function(a){
    const sel = a === selectedAvatar ? " selected" : "";
    return '<div class="avatar-opt' + sel + '" onclick="pickAvatar(\'' + a + '\')">' + a + '</div>';
  }).join("");

  const frameClass = current ? current.frameClass : "";
  const frameFxHtml = current ? buildFrameFx(current.frameClass) : "";

  const badgeRowHtml = TIERS.slice().reverse().map(function(t){
    const unlocked = allFrames ? true : total >= t.min;
    const isSelected = allFrames && current && current.key === t.key;
    const clickAttr = allFrames ? ' onclick="pickFrame(\'' + t.key + '\')" style="cursor:pointer"' : '';
    return (
      '<div class="badge-item' + (unlocked ? ' unlocked' : '') + (isSelected ? ' frame-selected' : '') + '"' + clickAttr + '>' +
        '<div class="badge-swatch-wrap ' + t.frameClass + '">' + buildBadgeFx(t.frameClass) + '<div class="badge-swatch"></div></div>' +
        '<div class="badge-need">' + t.min.toLocaleString("de-DE") + '</div>' +
      '</div>'
    );
  }).join("");

  const nextHint = allFrames
    ? '🌟 ບັນຊີພິເສດ: ກົດເລືອກກອບໂປຣໄຟລ໌ໄດ້ທຸກແບບຂ້າງເທິງ'
    : (next
      ? 'ອີກ ' + (next.min - total).toLocaleString("de-DE") + ' ກີບ ຈະໄດ້ຮັບກອບໂປຣໄຟລ໌ໃໝ່'
      : 'ທ່ານໄດ້ຮັບກອບໂປຣໄຟລ໌ສູງສຸດແລ້ວ! 👑');

  const avatarBigInner = selectedAvatarUrl
    ? '<img src="' + escapeHtml(selectedAvatarUrl) + '" alt="ຮູບໂປຣໄຟລ໌">'
    : selectedAvatar;

  document.getElementById("pageWrap").innerHTML =
    '<div class="profile-card">' +
      '<div class="avatar-frame-wrap ' + frameClass + '">' +
        frameFxHtml +
        '<div class="avatar-big">' + avatarBigInner + '</div>' +
      '</div>' +
      '<div class="name-line">' + escapeHtml(nickname) + '</div>' +
      '<div class="email-line">' + escapeHtml(currentUser.email) + '</div>' +
      '<div class="avatar-btn-row">' +
        '<button class="change-avatar-btn" onclick="toggleAvatarGrid()">🖼️ ເລືອກອະວາຕາ</button>' +
        '<button class="upload-avatar-btn" id="uploadAvatarBtn" onclick="document.getElementById(\'avatarFileInput\').click()">📷 ອັບໂຫລດຮູບຈິງ</button>' +
      '</div>' +
      '<input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarFile(event)">' +
      '<div class="avatar-upload-msg" id="avatarUploadMsg"></div>' +
      '<div class="avatar-grid" id="avatarGrid">' + avatarGridHtml + '</div>' +
    '</div>' +

    '<div class="section-card">' +
      '<div class="section-title">✏️ ຕັ້ງຊື່ເລັ່ນ</div>' +
      '<input class="nick-input" id="nickInput" maxlength="24" placeholder="ຊື່ເລັ່ນຂອງທ່ານ" value="' + escapeHtml(profile.nickname || "") + '">' +
      '<button class="save-btn" onclick="saveProfile()">💾 ບັນທຶກ</button>' +
      '<div class="save-msg" id="saveMsg"></div>' +
    '</div>' +

    '<div class="section-card">' +
      '<div class="section-title">🖼️ ' + (allFrames ? 'ກອບໂປຣໄຟລ໌ (ເລືອກໄດ້ທຸກແບບ)' : 'ກອບໂປຣໄຟລ໌ (ຕາມຍອດເຕີມສະສົມ)') + '</div>' +
      '<div class="topup-total num">' + total.toLocaleString("de-DE") + ' ກີບ</div>' +
      '<div class="topup-sub">ຍອດເຕີມເງິນສະສົມທັງໝົດ</div>' +
      '<div class="badge-row">' + badgeRowHtml + '</div>' +
      '<div class="next-hint">' + nextHint + '</div>' +
    '</div>' +

    '<button class="logout-btn" onclick="doLogout()">🚪 ອອກຈາກລະບົບ</button>';
}

function toggleAvatarGrid(){
  document.getElementById("avatarGrid").classList.toggle("show");
}

function pickAvatar(a){
  selectedAvatar = a;
  selectedAvatarUrl = null; // เลือก emoji แล้วเลิกใช้รูปจริงที่เคยอัปโหลด
  render();
  // เปิดกริดค้างไว้หลัง re-render เพื่อให้กดเลือกต่อได้สะดวก
  document.getElementById("avatarGrid").classList.add("show");
}

function pickFrame(key){
  if(!profile || !profile.avatar_all_frames) return; // เฉพาะบัญชีที่ปลดล็อกทุกกรอบเท่านั้น
  selectedFrameKey = key;
  render();
}

async function handleAvatarFile(event){
  const file = event.target.files && event.target.files[0];
  event.target.value = ""; // เคลียร์ input ไว้เผื่ออัปโหลดไฟล์เดิมซ้ำ
  if(!file) return;

  const msg = document.getElementById("avatarUploadMsg");
  const btn = document.getElementById("uploadAvatarBtn");

  if(!file.type.startsWith("image/")){
    msg.style.color = "#ff7a86";
    msg.innerText = "ກະລຸນາເລືອກໄຟລ໌ຮູບພາບ";
    return;
  }
  if(file.size > AVATAR_MAX_BYTES){
    msg.style.color = "#ff7a86";
    msg.innerText = "ຮູບໃຫຍ່ເກີນໄປ (ສູງສຸດ 3MB)";
    return;
  }

  btn.disabled = true;
  msg.style.color = "#999";
  msg.innerText = "ກຳລັງອັບໂຫລດ...";

  try{
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = currentUser.id + "/" + Date.now() + "." + ext;

    const { error: uploadError } = await supabaseClient
      .storage
      .from(AVATAR_BUCKET)
      .upload(path, file, { upsert:true, cacheControl:"3600" });

    if(uploadError) throw uploadError;

    const { data: urlData } = supabaseClient
      .storage
      .from(AVATAR_BUCKET)
      .getPublicUrl(path);

    selectedAvatarUrl = urlData.publicUrl + "?t=" + Date.now(); // กันแคชรูปเก่า
    msg.style.color = "#3ddc9a";
    msg.innerText = "✅ ອັບໂຫລດແລ້ວ ກົດ 💾 ບັນທຶກ ເພື່ອຢືນຢັນ";
    render();
  }catch(e){
    console.error("[handleAvatarFile] error:", e);
    msg.style.color = "#ff7a86";
    msg.innerText = "❌ ອັບໂຫລດບໍ່ສຳເລັດ: " + (e.message || "ไม่ทราบสาเหตุ");
  }finally{
    const stillThere = document.getElementById("uploadAvatarBtn");
    if(stillThere) stillThere.disabled = false;
  }
}

async function saveProfile(){
  const msg = document.getElementById("saveMsg");
  const nickname = document.getElementById("nickInput").value.trim();

  if(!nickname){
    msg.style.color = "#ff7a86";
    msg.innerText = "ກະລຸນາໃສ່ຊື່ເລັ່ນ";
    return;
  }

  msg.style.color = "#999";
  msg.innerText = "ກຳລັງບັນທຶກ...";

  const { error } = await supabaseClient
    .from("profiles")
    .upsert({
      user_id: currentUser.id,
      nickname: nickname,
      avatar_emoji: selectedAvatar,
      avatar_url: selectedAvatarUrl,
      selected_frame_key: profile.avatar_all_frames ? selectedFrameKey : null,
      updated_at: new Date().toISOString()
    });

  if(error){
    msg.style.color = "#ff7a86";
    msg.innerText = "❌ ບັນທຶກບໍ່ສຳເລັດ: " + error.message;
    return;
  }

  profile.nickname = nickname;
  profile.avatar_emoji = selectedAvatar;
  profile.avatar_url = selectedAvatarUrl;
  profile.selected_frame_key = profile.avatar_all_frames ? selectedFrameKey : null;
  msg.style.color = "#3ddc9a";
  msg.innerText = "✅ ບັນທຶກແລ້ວ";
  render();
  document.getElementById("saveMsg").innerText = "✅ ບັນທຶກແລ້ວ";
  document.getElementById("saveMsg").style.color = "#3ddc9a";
}

async function doLogout(){
  await supabaseClient.auth.signOut();
  location.href = "index.html";
}

init();

</script>

</html>
