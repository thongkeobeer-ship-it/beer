<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ສັ່ງຊື້ສິນຄ້າ</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',Arial,sans-serif; -webkit-tap-highlight-color:transparent; }

:root{
  --bg:#0a0a0c;
  --card:#141417;
  --line:#28282e;
  --red:#ff2b45;
  --red2:#ff5a70;
  --green:#3ddc73;
  --muted:#8b8b95;
  --gold:#ffcf4d;
}

body{ background:var(--bg); color:#fff; padding-bottom:40px; }
.num{ font-family:'Orbitron',sans-serif; }

.topbar{
  display:flex; align-items:center; gap:12px;
  padding:16px; position:sticky; top:0;
  background:rgba(10,10,12,.95);
  backdrop-filter:blur(6px);
  z-index:50;
  border-bottom:1px solid var(--line);
}
.back-btn{
  width:38px; height:38px; border-radius:50%;
  background:var(--card); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; font-size:18px; flex-shrink:0;
}
.topbar-title{ font-weight:700; font-size:16px; }

.wrap{ max-width:480px; margin:0 auto; padding:0 16px; }

/* ===== รูปสินค้า ===== */
.banner{
  margin-top:14px;
  height:220px;
  border-radius:18px;
  border:1px solid rgba(255,43,69,.35);
  box-shadow:0 0 30px rgba(255,43,69,.15);
  display:flex; align-items:center; justify-content:center;
  position:relative;
  overflow:hidden;
}
.banner .art{ font-size:88px; filter:drop-shadow(0 0 20px rgba(255,60,60,.6)); }
.banner .tag{
  position:absolute; top:12px; right:12px;
  background:linear-gradient(180deg,#ff5a70,#c60f24);
  color:#fff; font-size:11px; font-weight:700;
  padding:5px 12px; border-radius:20px;
}

/* ===== ชื่อสินค้า ===== */
.title-main{ font-size:22px; font-weight:800; margin-top:18px; }
.title-sub{
  display:flex; align-items:center; gap:6px;
  font-size:13px; color:var(--muted); margin-top:6px;
}

/* ===== ราคา + สต็อก ===== */
.price-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; padding:16px;
  background:var(--card); border:1px solid var(--line); border-radius:14px;
}
.price-block .lb{ font-size:11px; color:var(--muted); margin-bottom:4px; }
.price-block .val{ font-size:22px; font-weight:800; color:var(--gold); }
.stock-block{ text-align:right; }
.stock-block .row{ display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.dot-green{ width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); display:inline-block; }
.dot-red{ width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 6px var(--red); display:inline-block; }
.stock-block .val{ font-size:15px; font-weight:700; color:#fff; }

/* ===== ตัวเลือกจำนวน ===== */
.qty-section{
  display:flex; align-items:center; gap:12px; margin-top:16px;
}
.qty-stepper{
  display:flex; align-items:center; flex:1;
  background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
}
.qty-btn{
  width:52px; height:52px; border:none;
  background:linear-gradient(180deg,#ff5a70,#c60f24);
  color:#fff; font-size:22px; font-weight:700; cursor:pointer; flex-shrink:0;
}
.qty-btn:disabled{ opacity:.35; filter:grayscale(.4); }
.qty-val{
  flex:1; text-align:center; font-size:18px; font-weight:700;
  font-family:'Orbitron',sans-serif;
}

/* ===== ปุ่มสั่งซื้อ ===== */
.buy-btn{
  width:100%; margin-top:18px; padding:18px; border:none; border-radius:16px;
  background:linear-gradient(180deg, var(--red2), var(--red));
  color:#fff; font-size:16px; font-weight:700; font-family:'Kanit',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 8px 24px rgba(255,43,69,.35);
  transition:.15s;
}
.buy-btn:disabled{ opacity:.4; filter:grayscale(.3); }
.buy-btn:not(:disabled):active{
  transform:scale(.97);
  box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 0 30px rgba(255,43,69,.7);
}
@keyframes pulseGlow{
  0%{ box-shadow:0 0 0 0 rgba(255,43,69,.55); }
  100%{ box-shadow:0 0 0 14px rgba(255,43,69,0); }
}
.buy-btn.pulsing{ animation:pulseGlow 1s ease-out; }

.status-msg{ text-align:center; font-size:12.5px; margin-top:12px; min-height:16px; }

/* ===== แถบความน่าเชื่อถือ ===== */
.trust{ display:flex; justify-content:space-between; gap:8px; margin-top:22px; }
.trust-item{
  flex:1; text-align:center; background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:12px 6px;
}
.trust-item .ic{ font-size:18px; margin-bottom:5px; }
.trust-item .tx{ font-size:10.5px; color:var(--muted); line-height:1.3; }
</style>
</head>
<body>

<div class="topbar">
<a href="index.html" class="back-btn">‹</a>
<div class="topbar-title">BEER!store</div>
</div>

<div class="wrap">

  <div class="banner" id="banner">
    <div class="art" id="gameIcon">🎮</div>
    <span class="tag">🔥 ຂາຍດີ</span>
  </div>

  <div class="title-main" id="productName">ສິນຄ້າ</div>
  <div class="title-sub">🛒 <span id="productNameSub">ສິນຄ້າ</span></div>

  <div class="price-row">
    <div class="price-block">
      <div class="lb">ລາຄາ</div>
      <div class="val num" id="priceVal">0 ກີບ</div>
    </div>
    <div class="stock-block">
      <div class="row">
        <span class="dot dot-green" id="stockDot"></span>
        <span class="val num" id="stockVal">—</span>
      </div>
      <div class="lb" style="margin-top:4px;">ຄົງເຫຼືອ</div>
    </div>
  </div>

  <div class="qty-section">
    <div class="qty-stepper">
      <button class="qty-btn" id="qtyMinus" type="button">−</button>
      <span class="qty-val num" id="qtyVal">1</span>
      <button class="qty-btn" id="qtyPlus" type="button">+</button>
    </div>
  </div>

  <button class="buy-btn" id="buyBtn">🛒 ສັ່ງຊື້ຕອນນີ້ເລີຍ</button>
  <div class="status-msg" id="statusMsg"></div>

  <div class="trust">
    <div class="trust-item"><div class="ic">⚡</div><div class="tx">ສົ່ງອັດຕະໂນມັດ<br>ພາຍໃນ 5 ນາທີ</div></div>
    <div class="trust-item"><div class="ic">🔒</div><div class="tx">ປອດໄພ<br>100%</div></div>
    <div class="trust-item"><div class="ic">💬</div><div class="tx">ຊ່ວຍເຫຼືອ<br>ຕະຫຼອດ 24 ຊມ.</div></div>
  </div>

</div>

<script src="supabase.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const productName = params.get("name") || "ບໍ່ລະບຸ";
const productPrice = Number(params.get("price")) || 0;
const productStock = Number(params.get("stock"));
const hasStock = !isNaN(productStock);
const maxQty = hasStock ? Math.max(0, productStock) : 99;

const ICON_MAP = {
  "PUBG Mobile":"🔫","ROBLOX":"🧱","FREE FIRE":"🔥","Minecraft":"⛏️",
  "Valorant":"🎯","ROV":"⚔️","Steam":"🕹️","Genshin":"💎"
};

let qty = 1;

document.getElementById("productName").innerText = productName;
document.getElementById("productNameSub").innerText = productName;
document.getElementById("gameIcon").innerText = ICON_MAP[productName] || "🎮";

const stockDot = document.getElementById("stockDot");
const stockVal = document.getElementById("stockVal");
const outOfStock = hasStock && productStock <= 0;

if(outOfStock){
  stockDot.className = "dot dot-red";
  stockVal.innerText = "ໝົດ";
} else if(hasStock){
  stockDot.className = "dot dot-green";
  stockVal.innerText = productStock + " ອັນ";
} else {
  stockDot.className = "dot dot-green";
  stockVal.innerText = "ພ້ອມຂາຍ";
}

const qtyValEl = document.getElementById("qtyVal");
const qtyMinusBtn = document.getElementById("qtyMinus");
const qtyPlusBtn = document.getElementById("qtyPlus");
const buyBtn = document.getElementById("buyBtn");

function renderQty(){
  qtyValEl.innerText = qty;
  qtyMinusBtn.disabled = qty <= 1 || outOfStock;
  qtyPlusBtn.disabled = qty >= maxQty || outOfStock;
  const total = productPrice * qty;
  document.getElementById("priceVal").innerText = total.toLocaleString("de-DE") + " ກີບ";
}

qtyMinusBtn.addEventListener("click", function(){
  if(qty > 1){ qty--; renderQty(); }
});
qtyPlusBtn.addEventListener("click", function(){
  if(qty < maxQty){ qty++; renderQty(); }
});

renderQty();

if(outOfStock){
  buyBtn.disabled = true;
  buyBtn.innerText = "ສິນຄ້າໝົດ";
}

(async function(){
  const {data:{session}} = await supabaseClient.auth.getSession();
  if(!session){
    buyBtn.disabled = true;
    buyBtn.innerText = "🔒 ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນ";
    document.getElementById("statusMsg").innerText = "ກຳລັງພາໄປໜ້າເຂົ້າສູ່ລະບົບ...";
    setTimeout(function(){ location.href = "index.html"; }, 2000);
  }
})();

buyBtn.addEventListener("click", async function(){
  if(outOfStock) return;

  const {data:{user}} = await supabaseClient.auth.getUser();
  if(!user){
    location.href = "index.html";
    return;
  }

  buyBtn.disabled = true;
  buyBtn.classList.add("pulsing");
  buyBtn.innerText = "ກຳລັງດຳເນີນການ...";
  const statusMsg = document.getElementById("statusMsg");
  statusMsg.style.color = "#999";
  statusMsg.innerText = "";

  const {data, error} = await supabaseClient
    .from("orders")
    .insert({
      user_id: user.id,
      user_email: user.email,
      product_name: productName,
      price: productPrice * qty,
      status: "pending",
      quantity: qty
    })
    .select()
    .single();

  if(error){
    statusMsg.style.color = "#ff5a5a";
    statusMsg.innerText = "ເກີດຂໍ້ຜິດພາດ: " + error.message;
    buyBtn.disabled = false;
    buyBtn.classList.remove("pulsing");
    buyBtn.innerText = "🛒 ສັ່ງຊື້ຕອນນີ້ເລີຍ";
    return;
  }

  buyBtn.innerText = "✅ ສັ່ງແລ້ວ #" + data.id;
  statusMsg.style.color = "#3ddc73";
  statusMsg.innerText = "ທີມງານຈະສົ່ງຂອງພາຍໃນ 5 ນາທີ ຫຼັງຢືນຢັນການຊຳລະເງິນຜ່ານ Discord";
});

</script>
</body>
</html>
