<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ສັ່ງຊື້ສິນຄ້າ</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="alert('ໂຫລດລະບົບ login ບໍ່ສຳເລັດ, ກະລຸນາກວດສອບອິນເຕີເນັດ ຫຼື ໂຫລດຫນ້າໃຫມ່')"></script>
</head>
<body>

<header class="topbar">
<a href="index.html" style="display:flex;align-items:center;text-decoration:none;color:white;">
<img src="img/logo.png" class="store-logo" style="width:38px;height:38px;">
</a>
<div style="flex:1;font-weight:600;">BEER!store</div>
</header>

<div class="page-title">
<h2 id="productName">ສິນຄ້າ</h2>
<p id="productPrice" style="color:#ff2b2b;font-size:20px;font-weight:700;margin-top:8px;"></p>
</div>

<section style="padding:0 16px;">
<div class="card" style="padding:16px;">
<div class="card-body">
<div class="stock" style="margin-bottom:10px;"><span class="dot"></span> ພ້ອມສັ່ງຊື້</div>
<button class="buy-btn" id="buyBtn" onclick="buy()">🛒 ຢືນຢັນສັ່ງຊື້</button>
</div>
</div>
</section>

<script src="supabase.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const productName = params.get("name") || "ບໍ່ລະບຸ";
const productPrice = Number(params.get("price")) || 0;

document.getElementById("productName").innerText = productName;
document.getElementById("productPrice").innerText =
    productPrice ? productPrice.toLocaleString("lo-LA") + " ກີບ" : "";

// ต้องล็อกอินก่อนถึงจะสั่งซื้อได้ - รอ session โหลดให้เสร็จก่อนตัดสินใจ
(async ()=>{
    try{
        const {data:{session}} = await supabaseClient.auth.getSession();
        if(!session){
            document.getElementById("buyBtn").disabled = true;
            document.getElementById("buyBtn").innerText = "🔒 ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນ";
            setTimeout(()=>{ location.href = "index.html"; }, 2000);
        }
    } catch(err){
        // ก่อนหน้านี้ถ้าเช็ค session พังตรงนี้ (เช่น CDN โหลดไม่ทัน) หน้าเว็บ
        // จะค้างเงียบ ๆ โดยไม่บอกอะไรเลย ตอนนี้เด้งกลับหน้าแรกแทน
        console.error("[product.html session check] error:", err);
        document.getElementById("buyBtn").disabled = true;
        document.getElementById("buyBtn").innerText = "⚠️ ເຊື່ອມຕໍ່ບໍ່ໄດ້ ລອງໃຫມ່";
    }
})();

async function buy(){
    try{
        const {data:{user}} = await supabaseClient.auth.getUser();
        if(!user){
            alert("ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນສັ່ງຊື້");
            location.href = "index.html";
            return;
        }

        const btn = document.getElementById("buyBtn");
        btn.disabled = true;
        btn.innerText = "ກຳລັງດຳເນີນການ...";

        const {data, error} = await supabaseClient
            .from("orders")
            .insert({
                user_id: user.id,
                user_email: user.email,
                product_name: productName,
                price: productPrice,
                status: "pending"
            })
            .select()
            .single();

        if(error){
            alert("ເກີດຂໍ້ຜິດພາດ: " + error.message);
            btn.disabled = false;
            btn.innerText = "🛒 ຢືນຢັນສັ່ງຊື້";
            return;
        }

        alert("ສັ່ງຊື້ສຳເລັດ! ອໍເດີເລກທີ #" + data.id + "\nທີມງານຈະຕິດຕໍ່ກັບຜ່ານ Discord ເພື່ອຢືນຢັນການຊຳລະເງິນ");
        btn.innerText = "✅ ສັ່ງແລ້ວ ລໍຖ້າຕິດຕໍ່ກັບ";
    } catch(err){
        console.error("[buy] error:", err);
        alert("ເຊື່ອມຕໍ່ລະບົບບໍ່ໄດ້ ລອງໃຫມ່ພາຍຫຼັງ");
        const btn = document.getElementById("buyBtn");
        btn.disabled = false;
        btn.innerText = "🛒 ຢືນຢັນສັ່ງຊື້";
    }
}

</script>
</body>
</html>
